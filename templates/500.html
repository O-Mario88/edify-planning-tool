<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Something went wrong — Edify</title>
<style>
  body { margin: 0; font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; background: #f8fafc; color: #334155; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  .card { background: #fff; border: 1px solid #e2e8f0; border-radius: 20px; padding: 48px 56px; text-align: center; box-shadow: 0 1px 3px rgba(15, 23, 42, .06); max-width: 420px; margin: 24px; }

  p { font-size: 13px; color: #64748b; line-height: 1.6; margin: 0 0 24px; }
  a.btn { display: inline-block; background: #0f172a; color: #fff; text-decoration: none; font-size: 13px; font-weight: 600; padding: 10px 22px; border-radius: 12px; }
  a.btn:hover { background: #1e293b; }
</style>
</head>
<body>
<div class="card">
<div class="code">500</div>
<h1>Something went wrong</h1>

</html>
