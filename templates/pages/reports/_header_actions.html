<form method="get" id="reports-fy-form">
<select name="fy" onchange="document.getElementById('reports-fy-form').submit()" class="h-9 px-3 bg-white border border-slate-200 rounded-xl text-[12px] font-semibold text-slate-600 shadow-sm focus:outline-none focus:ring-1 focus:ring-[var(--edify-primary,#2e505f)]">
{% for option in fy_options %}
<option value="{{ option }}" {% if option == fy %}selected{% endif %}>FY {{ option }}</option>
{% endfor %}
</select>
</form>
<a href="?fy={{ fy }}&export=csv" class="h-9 px-4 bg-slate-800 hover:bg-slate-700 text-white rounded-xl text-[12px] font-semibold flex items-center gap-1.5 transition-all shadow-sm">
<svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
Export CSV
</a>
