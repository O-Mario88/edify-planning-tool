{% extends "layouts/shell.html" %}

{% block title %}User Management — Edify{% endblock %}

{% block shell_content %}
<div class="p-6 max-w-7xl mx-auto space-y-6">
  
  <div class="flex items-center justify-between">
    <div>
      <h1 class="text-[26px] font-extrabold text-slate-800 tracking-tight">User Management</h1>
      <p class="text-[12.5px] text-[var(--text-secondary)] mt-1 font-semibold">Edify Operations · User Management</p>
    </div>
  </div>
  
  <div class="bg-white rounded-2xl border border-[var(--border-card)] p-4 shadow-sm"><form method="get" action="/admin/users" class="flex gap-3"><input type="text" name="q" value="{{ search }}" placeholder="Search users..." class="flex-1 h-9 px-3 rounded-lg border border-[var(--color-edify-border)] text-[12px] bg-slate-50 focus:outline-none"><button type="submit" class="h-9 px-4 bg-[var(--color-edify-primary)] text-white rounded-lg text-[12px] font-bold">Search</button></form></div>
  <div class="bg-white rounded-2xl border border-[var(--border-card)] shadow-sm overflow-hidden">
    <table class="w-full text-[12.5px]"><thead><tr class="bg-slate-50/60 border-b border-slate-100"><th class="text-left px-5 py-3 text-[10px] font-bold uppercase text-slate-400">User</th><th class="text-left px-4 py-3 text-[10px] font-bold uppercase text-slate-400">Email</th><th class="text-left px-4 py-3 text-[10px] font-bold uppercase text-slate-400">Status</th><th class="px-4 py-3"></th></tr></thead>
    <tbody class="divide-y divide-slate-100">{% for u in users %}<tr class="hover:bg-slate-50/60 group"><td class="px-5 py-3.5 font-bold text-slate-800">{{ u.name }}</td><td class="px-4 py-3.5 text-slate-500">{{ u.email }}</td><td class="px-4 py-3.5"><span class="inline-flex items-center px-2 py-0.5 rounded-full text-[10.5px] font-bold bg-emerald-50 text-emerald-700">{{ u.status }}</span></td><td class="px-4 py-3.5 text-right"><a href="/admin/users/{{ u.id }}" class="opacity-0 group-hover:opacity-100 text-[11px] font-bold text-[var(--color-edify-primary)] transition-opacity">Edit →</a></td></tr>{% endfor %}</tbody></table>
  </div>

</div>
{% endblock %}
