{% extends "layouts/shell.html" %}

{% block title %}Calendar — Edify{% endblock %}

{% block shell_content %}
<!-- FullCalendar CSS and JS -->
<link href='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/main.min.css' rel='stylesheet' />
<script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js'></script>

<style>
  /* Custom premium styles to blend FullCalendar with Edify Design language */
  #fullcalendar-view {
    font-family: var(--edify-font-sans);
    background-color: var(--edify-surface-raised);
    border-radius: var(--edify-radius-lg, 16px);
  }
  .fc {
    --fc-border-color: var(--edify-surface-muted);
    --fc-daygrid-event-dot-width: 6px;
  }
  .fc .fc-toolbar {
    margin-bottom: 1.5rem !important;
  }
  .fc .fc-toolbar-title {
    font-size: 16px !important;
    font-weight: 600 !important;
    color: var(--edify-text) !important;
    font-family: var(--edify-font-sans);
  }
  .fc .fc-button-primary {
    background-color: var(--edify-primary) !important;
    border-color: var(--edify-primary) !important;
    font-size: 12px !important;
    font-weight: 600 !important;
    text-transform: uppercase !important;
    letter-spacing: 0.05em !important;
    padding: 0.5rem 0.75rem !important;
    border-radius: 8px !important;
    transition: all 0.15s ease-in-out !important;
    color: var(--edify-surface-raised) !important;
  }
  .fc .fc-button-primary:hover {
    opacity: 0.9 !important;
    background-color: var(--edify-primary) !important;
    border-color: var(--edify-primary) !important;
  }
  .fc .fc-button-primary:disabled {
    opacity: 0.5 !important;
    background-color: var(--edify-primary) !important;
  }
  .fc .fc-button-primary:not(:disabled).fc-button-active,
  .fc .fc-button-primary:not(:disabled):active {
    background-color: var(--edify-text) !important;
    border-color: var(--edify-text) !important;
  }
  .fc .fc-col-header-cell-cushion {
    font-size: 12px !important;
    font-weight: 600 !important;
    color: var(--edify-text-subtle) !important;
    text-transform: uppercase !important;
    letter-spacing: 0.05em !important;
    padding: 8px 0 !important;
  }
  .fc .fc-daygrid-day-number {
    font-size: 12px !important;
    font-weight: 500 !important;
    color: var(--edify-text-muted) !important;
    padding: 6px 8px !important;
  }
  .fc .fc-daygrid-day.fc-day-today {
    background-color: var(--edify-surface-muted) !important;
  }
  .fc-event-completed {
    background-color: var(--edify-success-light) !important;
    color: var(--edify-chart-green) !important;
    border: 1px solid var(--edify-success-border) !important;
    border-radius: 6px !important;
    padding: 3px 6px !important;
    font-size: 12px !important;
    font-weight: 600 !important;
  }
  .fc-event-planned {
    background-color: var(--edify-info-light) !important;
    color: var(--edify-chart-blue) !important;
    border: 1px solid var(--edify-info-border) !important;
    border-radius: 6px !important;
    padding: 3px 6px !important;
    font-size: 12px !important;
    font-weight: 600 !important;
  }
  .fc-event-completed:hover, .fc-event-planned:hover {
    transform: translateY(-0.5px);
    box-shadow: 0 2px 6px rgba(0,0,0,0.05);
  }
  /* REG-02 — same Sunday/holiday/blackout dates the scheduling gate
     enforces, flagged here so users don't attempt a date that will be
     rejected server-side. */
  .fc-day-blocked {
    background-color: var(--edify-danger-light, rgba(239,68,68,0.06)) !important;
  }
  .fc-day-blocked .fc-daygrid-day-number {
    color: var(--edify-danger, #ef4444) !important;
  }
  .calendar-blocked-legend {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    font-weight: 600;
    color: var(--edify-text-muted);
  }
  .calendar-blocked-legend .swatch {
    width: 10px;
    height: 10px;
    border-radius: 3px;
    background-color: var(--edify-danger-light, rgba(239,68,68,0.15));
    border: 1px solid var(--edify-danger, #ef4444);
  }
</style>

<div class="px-4 sm:px-6 py-5 space-y-4 max-w-[1500px] mx-auto">
  <div class="flex items-center justify-between">
    <div>
      <h1 class="text-[21px] font-extrabold tracking-tight">Calendar</h1>
      <p class="text-[12px] text-slate-400 font-semibold mt-0.5">Edify Operations · Interactive Planner</p>
    </div>
    <span class="calendar-blocked-legend"><span class="swatch"></span> Blocked for scheduling (Sunday / holiday / blackout)</span>
  </div>

  <!-- FullCalendar Container -->
  <div class="edify-surface rounded-surface border border-slate-100 p-5 shadow-sm">
    <div id="fullcalendar-view"></div>
  </div>
</div>

<!-- Embedded JSON Events Payload -->
<script id="calendar-events-data" type="application/json">
  [
    {% for a in activities %}
      {
        "id": "{{ a.id }}",
        "title": "{{ a.activity_type|title }}{% if a.school %} @ {{ a.school.name }}{% endif %}",
        "start": "{{ a.planned_date|date:'Y-m-d' }}",
        "classNames": ["{% if a.status == 'completed' %}fc-event-completed{% else %}fc-event-planned{% endif %}"],
        "extendedProps": {
          "status": "{{ a.status }}",
          "school": "{{ a.school.name|default:'' }}",
          "activity_type": "{{ a.activity_type|title }}"
        }
      }{% if not forloop.last %},{% endif %}
    {% endfor %}
  ]
</script>

{{ blocked_dates|json_script:"blocked-dates-data" }}
<script>
  document.addEventListener('DOMContentLoaded', function() {
    const calendarEl = document.getElementById('fullcalendar-view');
    const eventsData = JSON.parse(document.getElementById('calendar-events-data').textContent);
    // REG-02 — server-computed public-holiday/blackout dates for this month;
    // Sunday is derived client-side from the day-of-week.
    const blockedDates = JSON.parse(document.getElementById('blocked-dates-data').textContent);

    // Set initial date dynamically based on context month/year if available
    const initialDate = '{{ year }}-{{ month|stringformat:"02d" }}-01';

    const calendar = new FullCalendar.Calendar(calendarEl, {
      initialView: 'dayGridMonth',
      initialDate: initialDate,
      headerToolbar: {
        left: 'prev,next today',
        center: 'title',
        right: 'dayGridMonth,timeGridWeek'
      },
      events: eventsData,
      themeSystem: 'standard',
      height: 'auto',
      dayCellDidMount: function(arg) {
        const iso = arg.date.toISOString().slice(0, 10);
        const isSunday = arg.date.getDay() === 0;
        const reason = blockedDates[iso] || (isSunday ? 'Sunday' : null);
        if (reason) {
          arg.el.classList.add('fc-day-blocked');
          arg.el.setAttribute('title', 'Blocked for scheduling: ' + reason);
        }
      },
      eventClick: function(info) {
        // Show details in a modal or drawer
        const props = info.event.extendedProps;
        alert(`${props.activity_type}\nStatus: ${props.status.toUpperCase()}\nSchool: ${props.school || 'N/A'}\nPlanned: ${info.event.startStr}`);
      }
    });
    calendar.render();
  });
</script>
{% endblock %}
