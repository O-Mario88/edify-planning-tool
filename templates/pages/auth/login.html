{% extends "layouts/auth.html" %}

{% block auth_content %}
{% if error %}
<div class="p-3 rounded-xl bg-rose-50 border border-rose-200 text-[12px] font-semibold text-rose-700">
{{ error }}
</div>
{% endif %}

<form action="/login" method="post" class="space-y-4">
{% csrf_token %}
<div>
<label for="email" class="block text-[11px] font-semibold uppercase tracking-wider text-slate-400">Email address</label>
<div class="mt-1">
<input
type="email"
name="email"
id="email"
required
value="{{ email|default:'' }}"
class="w-full h-10 px-3 rounded-xl border border-slate-200 text-[12px] font-semibold text-slate-700 placeholder:text-slate-400 placeholder:font-medium focus:outline-none focus:ring-2 focus:ring-[var(--color-edify-primary)]/20 focus:border-[var(--color-edify-primary)]"
placeholder="cceo@edify.org"
>
</div>
</div>

<div>
<label for="password" class="block text-[11px] font-semibold uppercase tracking-wider text-slate-400">Password</label>
<div class="mt-1">
<input
type="password"
name="password"
id="password"
required
class="w-full h-10 px-3 rounded-xl border border-slate-200 text-[12px] font-semibold text-slate-700 placeholder:text-slate-400 placeholder:font-medium focus:outline-none focus:ring-2 focus:ring-[var(--color-edify-primary)]/20 focus:border-[var(--color-edify-primary)]"
placeholder="••••••••"
>
</div>
</div>

<div class="flex items-center justify-between">
<div class="flex items-center">
<input
id="remember_me"
name="remember_me"
type="checkbox"
class="h-4 w-4 text-[var(--color-edify-primary)] focus:ring-[var(--color-edify-primary)] border-slate-300 rounded"
>
<label for="remember_me" class="ml-2 block text-[12px] text-slate-500 font-semibold select-none">
Remember me
</label>
</div>
</div>

<div>
<button
type="submit"
class="w-full h-10 rounded-xl bg-[var(--color-edify-primary)] hover:bg-[var(--color-edify-dark)] text-white text-[13px] font-semibold transition-all active:scale-[0.98] shadow-sm"
>
Sign in
</button>
</div>
</form>
{% endblock %}
