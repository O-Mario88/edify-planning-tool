{% extends "layouts/auth.html" %}

{% block auth_content %}
{% if error %}
<div class="p-3 rounded-lg bg-rose-50 border border-rose-200 text-[12px] font-semibold text-rose-700">
{{ error }}
</div>
{% endif %}

<form action="/login" method="post" class="space-y-4">
{% csrf_token %}
<div>
<label for="email" class="block text-[11px] font-bold uppercase tracking-wide text-slate-500">Email address</label>
<div class="mt-1">
<input 
type="email" 
name="email" 
id="email" 
required 
value="{{ email|default:'' }}"
class="w-full h-10 px-3 rounded-lg border border-[var(--color-edify-border)] text-[12px] focus:outline-none focus:ring-2 focus:ring-[var(--color-edify-primary)]/20"
placeholder="cceo@edify.org"
>
</div>
</div>

<div>
<label for="password" class="block text-[11px] font-bold uppercase tracking-wide text-slate-500">Password</label>
<div class="mt-1">
<input 
type="password" 
name="password" 
id="password" 
required 
class="w-full h-10 px-3 rounded-lg border border-[var(--color-edify-border)] text-[12px] focus:outline-none focus:ring-2 focus:ring-[var(--color-edify-primary)]/20"
placeholder="••••••••"
>
</div>
</div>

<div class="flex items-center justify-between">
<div class="flex items-center">
<input 
id="remember_me" 
name="remember_me" 
type="checkbox" 
class="h-4 w-4 text-[var(--color-edify-primary)] focus:ring-[var(--color-edify-primary)] border-slate-300 rounded"
>
<label for="remember_me" class="ml-2 block text-[12px] text-slate-500 font-semibold select-none">
Remember me
</label>
</div>
</div>

<div>
<button 
type="submit" 
class="w-full h-10 rounded-lg bg-[var(--color-edify-primary)] hover:bg-[var(--color-edify-dark)] text-white text-[14px] font-semibold transition-all active:scale-[0.98]"
>
Sign in
</button>
</div>
</form>
{% endblock %}
