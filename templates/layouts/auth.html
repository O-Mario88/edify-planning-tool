{% extends "base.html" %}

{% block content %}
<main class="h-full flex items-center justify-center p-4">
<div class="w-full max-w-[420px] rounded-lg p-6 sm:p-8 space-y-6 relative"
     style="background:var(--edify-surface);border:1px solid var(--edify-border);box-shadow:var(--edify-shadow-lg);">
  <!-- Subtle top highlight (Stripe trick) -->
  <div style="position:absolute;top:0;left:1px;right:1px;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.6) 20%,rgba(255,255,255,.6) 80%,transparent);border-radius:16px 16px 0 0;pointer-events:none;"></div>

  <div class="text-center">
    <div class="inline-flex items-center justify-center mb-3"
         style="height:48px;width:48px;border-radius:12px;background:linear-gradient(135deg,#14B8A6,#0D9488);box-shadow:0 4px 12px -2px rgba(20,184,166,.35);">
      <span style="font-size:22px;font-weight:800;color:#fff;">E</span>
    </div>
    <div style="font-size:24px;font-weight:800;color:var(--edify-text);letter-spacing:-.025em;">Edify</div>
    <p style="font-size:12px;color:var(--edify-text-muted);margin-top:4px;font-weight:500;">School Improvement Planning Command Center</p>
  </div>
  {% block auth_content %}{% endblock %}
</div>
</main>
{% endblock %}
