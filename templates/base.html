{% load static %}
<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}Edify School Improvement Planning{% endblock %}</title>

<!-- FOUC prevention — apply theme BEFORE CSS renders.
     Reads localStorage preference and applies .dark class immediately. -->
<script>
  (function() {
    var pref = localStorage.getItem('edify_theme') || 'system';
    var actual;
    if (pref === 'system') {
      var h = new Date().getHours();
      actual = (h >= 19 || h < 6) ? 'dark' : 'light';
    } else {
      actual = pref;
    }
    var html = document.documentElement;
    html.classList.add('theme-fade');
    if (actual === 'dark') html.classList.add('dark');
    html.dataset.theme = actual;
    html.dataset.themePref = pref;
  })();
</script>

<!-- Typography: Inter — enterprise standard for premium data-dense dashboards. -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

<!-- Compiled Tailwind Styling -->
<link rel="stylesheet" href="{% static 'css/main.css' %}?v=20260717a">

<!-- Edify Design System — the SINGLE source of truth for tokens.
All design tokens (color, type, spacing, radius, shadow, motion, dark theme)
live here. Templates consume tokens via var(--edify-*). -->
<link rel="stylesheet" href="{% static 'css/design-system.css' %}?v=20260717a">
<link rel="stylesheet" href="{% static 'css/components.css' %}?v=20260717a">
<link rel="stylesheet" href="{% static 'css/components/sidebar.css' %}?v=20260717a">
<link rel="stylesheet" href="{% static 'css/pages.css' %}?v=20260717a">
<link rel="stylesheet" href="{% static 'css/drawers.css' %}?v=20260717a">
<link rel="stylesheet" href="{% static 'css/app.css' %}?v=20260717a">

<style>
/* All design tokens live in design-system.css. This block only consumes them.
   Card elevation, topbar glass, and component styling live in components.css. */

/* Alpine: hide x-cloak elements until Alpine initializes. */
[x-cloak] { display: none !important; }

/* Body — token-driven, adapts to light/dark automatically. */
body {
  font-family: var(--edify-font-sans);
  background-color: var(--edify-bg);
  color: var(--edify-text);
  font-size: var(--edify-text-body-size);
  line-height: var(--edify-text-body-leading);
  -webkit-font-smoothing: antialiased;
}

/* Custom scrollbars — token-driven */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--edify-border-strong); border-radius: var(--edify-radius-pill); }
::-webkit-scrollbar-thumb:hover { background: var(--edify-text-subtle); }

/* Hover-revealed row actions stay reachable on touch + keyboard. */
@media (hover: none) {
  .group .opacity-0.group-hover\:opacity-100 { opacity: 1 !important; }
}
.opacity-0.group-hover\:opacity-100:focus-visible,
.group:focus-within .opacity-0.group-hover\:opacity-100 { opacity: 1 !important; }

/* Primary buttons map to the accent blue. */
button.bg-indigo-600, a.bg-indigo-600,
button.bg-blue-600, a.bg-blue-600,
button.bg-indigo-700, a.bg-indigo-700 {
  background-color: var(--edify-accent);
  color: #ffffff;
  font-weight: var(--edify-text-title-weight);
  border-radius: var(--edify-radius-md);
  transition: background-color var(--edify-transition-fast), transform var(--edify-transition-fast);
}
button.bg-indigo-600:hover, a.bg-indigo-600:hover,
button.bg-blue-600:hover, a.bg-blue-600:hover,
button.bg-indigo-700:hover, a.bg-indigo-700:hover {
  background-color: var(--edify-accent-hover);
  transform: translateY(-1px);
}

/* Secondary/outline buttons. */
button.border-slate-200, a.border-slate-200,
button.border-slate-300, a.border-slate-300 {
  background-color: var(--edify-surface);
  border: 1px solid var(--edify-border-strong);
  color: var(--edify-accent);
  border-radius: var(--edify-radius-md);
}
button.border-slate-200:hover, a.border-slate-200:hover,
button.border-slate-300:hover, a.border-slate-300:hover {
  background-color: var(--edify-accent-light);
}

/* Table headers. */
table th {
  color: var(--edify-text-muted);
  font-weight: var(--edify-text-label-weight);
  text-transform: uppercase;
  letter-spacing: var(--edify-text-micro-tracking);
  font-size: var(--edify-text-micro-size);
}
table tbody tr:hover { background-color: var(--edify-accent-light); }

/* Form fields — :where() keeps specificity zero so Tailwind utilities win. */
:where(input[type="text"], input[type="number"], input[type="email"],
input[type="password"], select, textarea) {
  border: 1px solid var(--edify-border);
  background-color: var(--edify-surface);
  border-radius: var(--edify-radius-md);
  color: var(--edify-text);
  font-size: var(--edify-text-body-size);
  font-family: var(--edify-font-sans);
  padding: 8px 12px;
  outline: none;
  transition: border-color var(--edify-transition-fast), box-shadow var(--edify-transition-fast);
}
input[type="text"]:focus, input[type="number"]:focus, input[type="email"]:focus,
input[type="password"]:focus, select:focus, textarea:focus {
  border-color: var(--edify-accent);
  box-shadow: var(--edify-focus-ring);
}

/* Smooth transitions on interactive elements. */
button, a, select, input, textarea {
  transition-duration: var(--edify-transition-fast);
  transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1);
}
</style>

<!-- HTMX (for fast server-driven partial updates) -->
<script src="https://unpkg.com/htmx.org@1.9.12" integrity="sha384-ujb1lZYygJmzgSwoxRggbCHcjc0rB2XoQrxeTUQyRjrOnlCoYta87iKBWq3EsdM2" crossorigin="anonymous"></script>
<script>
  // Server-side validation responses (400/403) carry user-facing notices —
  // e.g. the Daily Visit "reason required" panel and route/scheduling errors.
  // htmx only swaps 2xx by default, which silently drops those notices; allow
  // these statuses to swap into their hx-target like any other response.
  document.addEventListener('htmx:beforeSwap', function (e) {
    if (e.detail.xhr.status === 400 || e.detail.xhr.status === 403) {
      e.detail.shouldSwap = true;
      e.detail.isError = false;
    }
  });
</script>

<!-- Alpine.js Components -->
<script src="{% static 'js/alpine-components.js' %}"></script>

<!-- Alpine.js (for client-side UI states - dropdown toggles, tabs, sidebars) -->
<script defer src="https://unpkg.com/alpinejs@3.14.0/dist/cdn.min.js"></script>

<!-- ApexCharts & FullCalendar JS -->
<script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>
</head>
<body 
class="h-full bg-[var(--edify-bg)] text-[var(--edify-text)] antialiased"
hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}'
>
{% block content %}{% endblock %}

<!-- Global Flash/Alert Messages -->
<div id="toast-container" class="fixed bottom-4 right-4 z-50 space-y-2 pointer-events-none">
{% if messages %}
{% for msg in messages %}
<div 
x-data="{ show: true }" 
x-show="show" 
x-init="setTimeout(() => show = false, 4000)"
x-transition
class="pointer-events-auto flex items-center justify-between gap-3 px-4 py-3 rounded-xl border shadow-lg max-w-sm text-[12px] font-semibold {% if msg.tags == 'success' %}bg-emerald-50 text-emerald-700 border-emerald-200{% elif msg.tags == 'error' %}bg-rose-50 text-rose-700 border-rose-200{% else %}bg-slate-50 text-slate-700 border-slate-200{% endif %}"
>
<span>{{ msg }}</span>
<button @click="show = false" class="text-current opacity-70 hover:opacity-100">&times;</button>
</div>
{% endfor %}
{% endif %}
</div>
</body>
</html>
