{% load static %}
<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}Edify School Improvement Planning{% endblock %}</title>

<!-- Typography: Outfit is the sole typeface. (Source Sans 3 was loaded but
never used — dropped to remove the wasted network request.) -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<!-- Compiled Tailwind Styling -->
<link rel="stylesheet" href="{% static 'css/main.css' %}?v=20260705c">

<!-- Edify Design System — the SINGLE source of truth for tokens.
All design tokens (color, type, spacing, radius, shadow, motion) live
here. base.html <style> below only consumes tokens via var(--edify-*). -->
<link rel="stylesheet" href="{% static 'css/design-system.css' %}?v=20260705c">
<link rel="stylesheet" href="{% static 'css/components.css' %}?v=20260705c">
<link rel="stylesheet" href="{% static 'css/components/sidebar.css' %}?v=20260705c">
<link rel="stylesheet" href="{% static 'css/pages.css' %}?v=20260705c">
<link rel="stylesheet" href="{% static 'css/drawers.css' %}?v=20260705c">
<link rel="stylesheet" href="{% static 'css/app.css' %}">
<link href="https://cdnjs.cloudflare.com/ajax/libs/flowbite/2.3.0/flowbite.min.css" rel="stylesheet" />

<style>
/* base.html consumes tokens defined in design-system.css. No :root here. */
body {
  font-family: var(--edify-font-sans);
  background-color: #f8fafc;
  background-image: 
    radial-gradient(at 0% 0%, rgba(14, 165, 233, 0.05) 0px, transparent 50%),
    radial-gradient(at 50% 0%, rgba(139, 92, 246, 0.04) 0px, transparent 50%),
    radial-gradient(at 100% 0%, rgba(16, 185, 129, 0.03) 0px, transparent 50%);
  background-attachment: fixed;
  color: var(--edify-text);
  font-size: var(--edify-text-body-size);
  line-height: var(--edify-text-body-leading);
  -webkit-font-smoothing: antialiased;
}

/* Custom scrollbars */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(15, 23, 42, 0.12); border-radius: var(--edify-radius-pill); }
::-webkit-scrollbar-thumb:hover { background: rgba(15, 23, 42, 0.24); }

/* Premium card elevation: shadow-only, NO border. A-tier cards float rather
than look boxed-in — the 1px border was the "cheap" tell. */
.bg-white.rounded-xl,
.bg-white.rounded-2xl,
.card {
  background-color: rgba(255, 255, 255, 0.9) !important;
  backdrop-filter: blur(12px) !important;
  -webkit-backdrop-filter: blur(12px) !important;
  border: 1px solid rgba(226, 232, 240, 0.6) !important;
  box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.02), 0 2px 4px -1px rgba(0, 0, 0, 0.01) !important;
  border-radius: 16px !important;
  transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1) !important;
}
.bg-white.rounded-xl:hover,
.bg-white.rounded-2xl:hover,
.card:hover {
  box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05), 0 10px 10px -5px rgba(0, 0, 0, 0.02) !important;
  transform: translateY(-2px) !important;
  border-color: rgba(203, 213, 225, 0.8) !important;
}

/* Glassmorphism Sticky Header */
.edify-topbar {
  background-color: rgba(255, 255, 255, 0.8) !important;
  backdrop-filter: blur(8px) !important;
  -webkit-backdrop-filter: blur(8px) !important;
  border-bottom: 1px solid rgba(226, 232, 240, 0.8) !important;
  position: sticky !important;
  top: 0 !important;
  z-index: 30 !important;
}

/* Primary buttons map to the accent blue (interactive CTAs). */
button.bg-indigo-600, a.bg-indigo-600,
button.bg-blue-600,a.bg-blue-600,
button.bg-indigo-700, a.bg-indigo-700 {
background-color: var(--edify-accent);
color: #ffffff;
font-weight: var(--edify-text-title-weight);
border-radius: var(--edify-radius-md);
transition: background-color var(--edify-transition-fast), transform var(--edify-transition-fast);
}
button.bg-indigo-600:hover, a.bg-indigo-600:hover,
button.bg-blue-600:hover,a.bg-blue-600:hover,
button.bg-indigo-700:hover, a.bg-indigo-700:hover {
background-color: var(--edify-accent-hover);
transform: translateY(-1px);
}

/* Secondary/outline buttons. */
button.border-slate-200, a.border-slate-200,
button.border-slate-300, a.border-slate-300 {
background-color: var(--edify-surface);
border: 1px solid var(--edify-border-strong);
color: var(--edify-accent);
border-radius: var(--edify-radius-md);
}
button.border-slate-200:hover, a.border-slate-200:hover,
button.border-slate-300:hover, a.border-slate-300:hover {
background-color: var(--edify-accent-light);
}

/* Table headers — use the label type token (12px medium uppercase). */
table th {
color: var(--edify-text-muted);
font-weight: var(--edify-text-label-weight);
text-transform: uppercase;
letter-spacing: var(--edify-text-micro-tracking);
font-size: var(--edify-text-micro-size);
}
table tbody tr:hover { background-color: rgba(15, 23, 42, 0.02); }

/* Form fields — body type, radius-sm, subtle focus ring using accent. */
input[type="text"], input[type="number"], input[type="email"],
input[type="password"], select, textarea {
border: 1px solid var(--edify-border);
background-color: var(--edify-surface);
border-radius: var(--edify-radius-md);
color: var(--edify-text);
font-size: var(--edify-text-body-size);
font-family: var(--edify-font-sans);
padding: 8px 12px;
outline: none;
transition: border-color var(--edify-transition-fast), box-shadow var(--edify-transition-fast);
}
input[type="text"]:focus, input[type="number"]:focus, input[type="email"]:focus,
input[type="password"]:focus, select:focus, textarea:focus {
border-color: var(--edify-accent);
box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
}

/* Smooth transitions on interactive elements (snappy, not slow). */
button, a, select, input, textarea {
transition-duration: var(--edify-transition-fast);
transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1);
}

/* Legacy sidebar (different from the .app-sidebar used in shell.html).
Kept because some templates still render this older sidebar markup. */
.edify-sidebar {
background-color: var(--edify-primary);
border-right: 1px solid var(--edify-primary-hover);
}
.sidebar-nav-header {
color: var(--edify-text-subtle);
font-size: var(--edify-text-micro-size);
font-weight: var(--edify-text-micro-weight);
letter-spacing: var(--edify-text-micro-tracking);
text-transform: uppercase;
}
.sidebar-item {
color: var(--edify-text-subtle);
transition: color var(--edify-transition-fast), background-color var(--edify-transition-fast);
}
.sidebar-item:hover {
color: #ffffff;
background-color: rgba(255, 255, 255, 0.06);
}
.sidebar-icon-container {
background-color: rgba(255, 255, 255, 0.04);
color: var(--edify-text-subtle);
transition: color var(--edify-transition-fast), background-color var(--edify-transition-fast);
}
.sidebar-item:hover .sidebar-icon-container {
color: #ffffff;
background-color: rgba(255, 255, 255, 0.08);
}
.sidebar-item-active {
background-color: rgba(255, 255, 255, 0.08);
color: #ffffff;
border-radius: var(--edify-radius-md);
border: 1px solid rgba(255, 255, 255, 0.15);
border-left: 4px solid var(--edify-warning);
}
.sidebar-item-active::before { display: none; }
.sidebar-item-active .sidebar-icon-container {
color: var(--edify-warning);
background-color: rgba(245, 158, 12, 0.1);
}
</style>

<!-- HTMX (for fast server-driven partial updates) -->
<script src="https://unpkg.com/htmx.org@1.9.12" integrity="sha384-ujb1lZYygJmzgSwoxRggbCHcjc0rB2XoQrxeTUQyRjrOnlCoYta87iKBWq3EsdM2" crossorigin="anonymous"></script>

<!-- Alpine.js Components -->
<script src="{% static 'js/alpine-components.js' %}"></script>

<!-- Alpine.js (for client-side UI states - dropdown toggles, tabs, sidebars) -->
<script defer src="https://unpkg.com/alpinejs@3.14.0/dist/cdn.min.js"></script>

<!-- ApexCharts & Flowbite JS -->
<script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/flowbite/2.3.0/flowbite.min.js"></script>
</head>
<body 
class="h-full bg-[var(--bg-page)] text-[var(--foreground)] font-sans antialiased"
hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}'
>
{% block content %}{% endblock %}

<!-- Global Flash/Alert Messages -->
<div id="toast-container" class="fixed bottom-4 right-4 z-50 space-y-2 pointer-events-none">
{% if messages %}
{% for msg in messages %}
<div 
x-data="{ show: true }" 
x-show="show" 
x-init="setTimeout(() => show = false, 4000)"
x-transition
class="pointer-events-auto flex items-center justify-between gap-3 px-4 py-3 rounded-xl border shadow-lg max-w-sm text-[12px] font-semibold {% if msg.tags == 'success' %}bg-emerald-50 text-emerald-700 border-emerald-200{% elif msg.tags == 'error' %}bg-rose-50 text-rose-700 border-rose-200{% else %}bg-slate-50 text-slate-700 border-slate-200{% endif %}"
>
<span>{{ msg }}</span>
<button @click="show = false" class="text-current opacity-70 hover:opacity-100">&times;</button>
</div>
{% endfor %}
{% endif %}
</div>
</body>
</html>
