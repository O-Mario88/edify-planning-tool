<!-- Apply the saved theme before CSS renders to prevent an unthemed flash. -->
<script>
  (function() {
    var html = document.documentElement;
    var allowed = ['system', 'light', 'blue', 'dark'];
    var pref = 'system';

    function resolveSystemTheme() {
      var hour = new Date().getHours();
      return hour >= 6 && hour < 19 ? 'light' : 'dark';
    }

    try {
      var saved = localStorage.getItem('edify_theme');
      if (allowed.indexOf(saved) !== -1) pref = saved;
    } catch (error) {
      pref = 'system';
    }

    var actual = pref === 'system' ? resolveSystemTheme() : pref;

    html.classList.remove('light', 'theme-blue', 'theme-dark', 'dark');
    if (actual === 'blue') html.classList.add('dark', 'theme-blue');
    if (actual === 'dark') html.classList.add('dark', 'theme-dark');
    if (actual === 'light') html.classList.add('light');
    html.dataset.theme = actual;
    html.dataset.themePref = pref;

    var schemeMeta = document.querySelector('meta[name="color-scheme"]');
    var themeMeta = document.querySelector('meta[name="theme-color"]');
    if (schemeMeta) schemeMeta.content = pref === 'system' ? 'light dark' : (actual === 'light' ? 'light' : 'dark');
    if (themeMeta) themeMeta.content = actual === 'light' ? '#edf1f3' : (actual === 'blue' ? '#001d39' : '#000000');

    requestAnimationFrame(function() {
      requestAnimationFrame(function() { html.classList.add('theme-fade'); });
    });
  })();
</script>

<style>
/* All design tokens live in design-system.css. This block only consumes them.
   Card elevation, topbar glass, and component styling live in components.css. */

/* Alpine: hide x-cloak elements until Alpine initializes. */
[x-cloak] { display: none !important; }

/* Body — token-driven, adapts to light/dark automatically. */
body {
  font-family: var(--edify-font-sans);
  background-color: var(--edify-bg);
  background-image: var(--edify-canvas-treatment);
  background-position: center 28%;
  background-size: cover;
  background-attachment: fixed;
  color: var(--edify-text);
  font-size: var(--edify-text-body-size);
  line-height: var(--edify-text-body-leading);
  -webkit-font-smoothing: antialiased;
}

/* Custom scrollbars — token-driven */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: var(--edify-scrollbar-track); }
::-webkit-scrollbar-thumb { background: var(--edify-scrollbar-thumb); border-radius: var(--edify-radius-pill); }
::-webkit-scrollbar-thumb:hover { background: var(--edify-text-subtle); }

/* Hover-revealed row actions stay reachable on touch + keyboard. */
@media (hover: none) {
  .group .opacity-0.group-hover\:opacity-100 { opacity: 1 !important; }
}
.opacity-0.group-hover\:opacity-100:focus-visible,
.group:focus-within .opacity-0.group-hover\:opacity-100 { opacity: 1 !important; }

/* Primary buttons map to the accent blue. */
button.edify-primary-solid, a.edify-primary-solid,
button.edify-primary-solid, a.edify-primary-solid,
button.edify-primary-solid, a.edify-primary-solid {
  background-color: var(--edify-accent);
  color: var(--edify-on-accent);
  font-weight: var(--edify-text-title-weight);
  border-radius: var(--edify-radius-md);
  transition: background-color var(--edify-transition-fast), transform var(--edify-transition-fast);
}
button.edify-primary-solid:hover, a.edify-primary-solid:hover,
button.edify-primary-solid:hover, a.edify-primary-solid:hover,
button.edify-primary-solid:hover, a.edify-primary-solid:hover {
  background-color: var(--edify-accent-hover);
  transform: translateY(-1px);
}

/* Secondary/outline buttons. */
button.border-slate-200, a.border-slate-200,
button.border-slate-300, a.border-slate-300 {
  background-color: var(--edify-surface);
  border: 1px solid var(--edify-border-strong);
  color: var(--edify-accent);
  border-radius: var(--edify-radius-md);
}
button.border-slate-200:hover, a.border-slate-200:hover,
button.border-slate-300:hover, a.border-slate-300:hover {
  background-color: var(--edify-accent-light);
}

/* Table headers. */
table th {
  color: var(--edify-text-muted);
  font-weight: var(--edify-text-label-weight);
  text-transform: uppercase;
  letter-spacing: var(--edify-text-micro-tracking);
  font-size: var(--edify-text-micro-size);
}
table tbody tr:hover { background-color: var(--edify-accent-light); }

/* Form fields — :where() keeps specificity zero so Tailwind utilities win. */
:where(input[type="text"], input[type="search"], input[type="number"],
input[type="email"], input[type="password"], input[type="tel"],
input[type="date"], input[type="datetime-local"], select, textarea) {
  border: 1px solid var(--edify-border);
  background-color: var(--edify-surface);
  border-radius: var(--edify-radius-sm);
  color: var(--edify-text);
  font-size: var(--edify-text-body-size);
  font-family: var(--edify-font-sans);
  padding: 8px 12px;
  outline: none;
  transition: border-color var(--edify-transition-fast), box-shadow var(--edify-transition-fast);
}
:where(input[type="text"], input[type="search"], input[type="number"],
input[type="email"], input[type="password"], input[type="tel"],
input[type="date"], input[type="datetime-local"], select, textarea):focus-visible {
  border-color: var(--edify-accent);
  box-shadow: var(--edify-focus-ring);
}

@media (max-width: 48rem), (pointer: coarse) {
  :where(input, select, textarea) {
    min-height: 48px;
    font-size: 1rem;
  }
}

/* Smooth transitions on interactive elements. */
button, a, select, input, textarea {
  transition-duration: var(--edify-transition-fast);
  transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1);
}
</style>

<!-- HTMX (for fast server-driven partial updates) -->
<script src="https://unpkg.com/htmx.org@1.9.12" integrity="sha384-ujb1lZYygJmzgSwoxRggbCHcjc0rB2XoQrxeTUQyRjrOnlCoYta87iKBWq3EsdM2" crossorigin="anonymous"></script>
<script>
  // Server-side validation responses (400/403) carry user-facing notices —
  // e.g. the Daily Visit "reason required" panel and route/scheduling errors.
  // htmx only swaps 2xx by default, which silently drops those notices; allow
  // these statuses to swap into their hx-target like any other response.
  document.addEventListener('htmx:beforeSwap', function (e) {
    if (e.detail.xhr.status === 400 || e.detail.xhr.status === 403) {
      e.detail.shouldSwap = true;
      e.detail.isError = false;
    }
  });

  // Contextual Help is inserted by HTMX. Open it with the native dialog API
  // after the swap so focus, Escape and the modal backdrop work consistently
  // without depending on a page-specific Alpine component.
  document.addEventListener('htmx:afterSwap', function (e) {
    e.target.querySelectorAll('dialog[data-auto-open]').forEach(function (dialog) {
      if (!dialog.open) {
        if (typeof dialog.showModal === 'function') dialog.showModal();
        else dialog.setAttribute('open', '');
      }
      var closeButton = dialog.querySelector('[data-help-close]');
      if (closeButton) closeButton.focus();
    });
  });
  document.addEventListener('close', function (e) {
    if (e.target.matches && e.target.matches('dialog[data-contextual-help]')) e.target.remove();
  });
</script>

<!-- Alpine.js Components -->
    <script src="{% static 'js/alpine-components.js' %}?v=20260718night1"></script>

<!-- Alpine.js (for client-side UI states - dropdown toggles, tabs, sidebars) -->

<!-- ApexCharts & FullCalendar JS -->
<script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
<script>
  /* ApexCharts merges window.Apex into every chart it creates, which makes this
     the only place that can give all of them the same empty state. Charts are
     built inline in a dozen templates, so without it each one would need its
     own copy and they would drift.

     A chart with no rows otherwise paints a blank rectangle, and a blank
     rectangle reads as "still loading" or "broken" rather than "nothing
     happened in this period". The platform rule is that an empty result states
     itself honestly instead of being dressed up or left ambiguous. */
  window.Apex = {
    noData: {
      text: 'No data for this period',
      align: 'center',
      verticalAlign: 'middle',
      style: {
        fontFamily: 'Inter, sans-serif',
        fontSize: '13px',
        /* Read from the token rather than hardcoded so the message sits at the
           same contrast as other muted copy. */
        color: getComputedStyle(document.documentElement)
          .getPropertyValue('--edify-text-muted').trim() || '#5f707a',
      },
    },
    /* Platform-wide chart styling. These merge into every chart config, so the
       reference look (rounded bars, smooth accent line, dotted gridlines, no
       axis chrome, soft legend) is consistent without editing each template. */
    chart: {
      fontFamily: 'Inter, sans-serif',
      foreColor: 'var(--edify-text-muted)',
      toolbar: { show: false },
      animations: { enabled: true, speed: 350 },
    },
    grid: {
      borderColor: 'transparent',
      strokeDashArray: 4,
      xaxis: { lines: { show: false } },
      yaxis: { lines: { show: true } },
      padding: { left: 2, right: 6 },
    },
    plotOptions: {
      bar: {
        columnWidth: '46%',
        borderRadius: 8,
        borderRadiusApplication: 'end',
        borderRadiusWhenStacked: 'last',
      },
    },
    stroke: { curve: 'smooth', width: 2, lineCap: 'round' },
    states: {
      hover: { filter: { type: 'darken', value: 0.92 } },
      active: { filter: { type: 'darken', value: 0.95 } },
    },
    legend: {
      position: 'top',
      horizontalAlign: 'right',
      fontSize: '12px',
      fontWeight: 500,
      markers: { size: 7, strokeWidth: 0, radius: 12 },
      labels: { colors: 'var(--edify-text-muted)' },
      itemMargin: { horizontal: 10, vertical: 0 },
    },
    tooltip: { theme: 'dark', style: { fontSize: '12px', fontFamily: 'Inter' } },
    dataLabels: { style: { fontFamily: 'Inter, sans-serif', fontSize: '12px', fontWeight: 600 } },
  };
</script>
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>
</head>
<body
class="h-full bg-[var(--edify-bg)] text-[var(--edify-text)] antialiased"
hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}'
>
{% block content %}{% endblock %}

<!-- Global Flash/Alert Messages -->
<div id="toast-container" class="fixed bottom-4 right-4 z-50 space-y-2 pointer-events-none" aria-live="polite" aria-atomic="false">
{% if messages %}
{% for msg in messages %}
<div
x-data="{ show: true }"
x-show="show"
x-init="setTimeout(() => show = false, 4000)"
x-transition
class="pointer-events-auto flex items-center justify-between gap-3 px-4 py-3 rounded-surface border shadow-lg max-w-sm text-[12px] font-semibold {% if msg.tags == 'success' %}bg-emerald-50 text-emerald-700 border-emerald-200{% elif msg.tags == 'error' %}bg-rose-50 text-rose-700 border-rose-200{% else %}bg-slate-50 text-slate-700 border-slate-200{% endif %}"
>
<span>{{ msg }}</span>
<button type="button" @click="show = false" class="text-current opacity-70 hover:opacity-100" aria-label="Dismiss notification">&times;</button>
</div>
{% endfor %}
{% endif %}
</div>
</body>
