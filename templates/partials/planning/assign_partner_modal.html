<div 
  x-init="$dispatch('open-modal')"
  class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm"
>
  <div 
    class="bg-white rounded-2xl border border-slate-100 shadow-xl max-w-lg w-full overflow-hidden flex flex-col max-h-[90vh] font-sans"
    @click.away="$dispatch('close-modal')"
  >
    <!-- Modal Header -->
    <div class="px-6 py-4.5 border-b border-slate-100 flex items-center justify-between bg-slate-50">
      <div>
        <h3 class="text-[15px] font-black text-slate-800 tracking-tight leading-none">Assign School to Partner</h3>
        <p class="text-[11px] text-slate-500 font-semibold mt-1">Handoff scheduling and monitoring to partner for {{ school.name }}</p>
      </div>
      <button 
        @click="$dispatch('close-modal')"
        class="h-7 w-7 rounded-full hover:bg-slate-200 flex items-center justify-center text-slate-400 hover:text-slate-600 transition-colors"
      >
        <svg class="h-4.5 w-4.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
      </button>
    </div>

    <!-- Modal Form Body -->
    <form 
      hx-post="/planning/assign-partner-action"
      hx-target="#assign-errors"
      class="flex-1 overflow-y-auto p-6 space-y-4 text-[12px] font-bold text-slate-600"
    >
      <input type="hidden" name="school_id" value="{{ school.school_id }}">

      <!-- Error message container -->
      <div id="assign-errors"></div>

      <!-- Partner Dropdown -->
      <div>
        <label for="partner_id" class="block text-[10px] font-bold uppercase tracking-wider text-slate-400">Partner Organization</label>
        <select 
          name="partner_id" 
          id="partner_id"
          required
          class="w-full h-10 px-3 rounded-lg border border-slate-200 bg-slate-50 mt-1 focus:outline-none focus:ring-2 focus:ring-blue-500/20 cursor-pointer"
        >
          <option value="">Select Partner...</option>
          {% for p in partners %}
            <option value="{{ p.id }}">{{ p.name }}</option>
          {% endfor %}
        </select>
      </div>

      <!-- Focus Intervention -->
      <div>
        <label for="focus_intervention" class="block text-[10px] font-bold uppercase tracking-wider text-slate-400">Focus Intervention</label>
        <select 
          name="focus_intervention" 
          id="focus_intervention"
          required
          class="w-full h-10 px-3 rounded-lg border border-slate-200 bg-slate-50 mt-1 focus:outline-none focus:ring-2 focus:ring-blue-500/20 cursor-pointer"
        >
          <option value="">Select Focus Intervention...</option>
          {% for code, label in interventions %}
            <option value="{{ code }}">{{ label }}</option>
          {% endfor %}
        </select>
      </div>

      <!-- Assignment Purpose -->
      <div>
        <label for="purpose" class="block text-[10px] font-bold uppercase tracking-wider text-slate-400">Assignment Purpose / Scope</label>
        <textarea 
          name="purpose" 
          id="purpose"
          required
          rows="2"
          placeholder="E.g. In-school training on Teaching & Learning intervention..."
          class="w-full p-2.5 rounded-lg border border-slate-200 bg-slate-50 mt-1 focus:outline-none focus:ring-2 focus:ring-blue-500/20 placeholder-slate-400"
        ></textarea>
      </div>

      <!-- Notes -->
      <div>
        <label for="notes" class="block text-[10px] font-bold uppercase tracking-wider text-slate-400">Additional Notes / Instructions</label>
        <textarea 
          name="notes" 
          id="notes"
          rows="2"
          placeholder="Specific field instructions or scheduling notes..."
          class="w-full p-2.5 rounded-lg border border-slate-200 bg-slate-50 mt-1 focus:outline-none focus:ring-2 focus:ring-blue-500/20 placeholder-slate-400"
        ></textarea>
      </div>

      <!-- Actions -->
      <div class="pt-4 border-t border-slate-100 flex items-center justify-end gap-2.5">
        <button 
          type="button" 
          @click="$dispatch('close-modal')"
          class="h-9.5 px-4 rounded-lg border border-slate-200 text-slate-600 bg-white hover:bg-slate-50 transition-colors"
        >
          Cancel
        </button>
        <button 
          type="submit"
          class="h-9.5 px-4.5 rounded-lg bg-blue-600 hover:bg-blue-700 text-white font-extrabold transition-colors shadow-sm"
        >
          Confirm Handoff
        </button>
      </div>
    </form>
  </div>
</div>
