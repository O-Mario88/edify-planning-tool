<nav
id="planning-tabs-header"
class="edify-tab-container"
role="tablist"
aria-label="Planning views"
{% if planning_tabs_oob %}hx-swap-oob="outerHTML"{% endif %}
>
<button
type="button"
id="planning-tab-client"
role="tab"
aria-controls="schools-table-container"
aria-selected="{% if active_tab == 'client' %}true{% else %}false{% endif %}"
tabindex="{% if active_tab == 'client' %}0{% else %}-1{% endif %}"
@click="document.querySelector('#filters-form [name=tab]').value = 'client'; document.getElementById('filters-form').dispatchEvent(new Event('change', { bubbles: true }))"
class="edify-tab-btn {% if active_tab == 'client' %}active{% endif %}"
>
Client Schools
</button>

<button
type="button"
id="planning-tab-core"
role="tab"
aria-controls="schools-table-container"
aria-selected="{% if active_tab == 'core' %}true{% else %}false{% endif %}"

@click="document.querySelector('#filters-form [name=tab]').value = 'core'; document.getElementById('filters-form').dispatchEvent(new Event('change', { bubbles: true }))"
class="edify-tab-btn {% if active_tab == 'core' %}active{% endif %}"
>
Core Schools
</button>

>
Clusters

>

</button>
</nav>
