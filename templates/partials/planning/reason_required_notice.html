{% load frontend_filters %}
<div class="p-3 bg-amber-50 border border-amber-200 rounded-lg space-y-2">
<p class="text-[12px] font-bold text-amber-700">{{ message }}</p>
<label class="edify-text-caption font-bold text-amber-700 uppercase tracking-wider">Reason</label>
<textarea
name="reason"
required
rows="2"
placeholder="e.g. Staff on leave, fewer schools available this week..."
class="w-full px-3 py-2 rounded-lg border border-amber-200 text-[12px] focus:outline-none focus:ring-2 focus:ring-amber-300"
></textarea>
<p class="edify-text-caption text-amber-500">Submit again to confirm scheduling below the daily target.</p>
</div>
