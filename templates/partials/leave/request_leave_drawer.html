<div class="h-full flex flex-col justify-between bg-slate-50 font-sans" x-data="leaveRequestForm()">
  
  <!-- Header -->
  <div class="px-6 py-5 bg-white border-b border-slate-100 flex items-center justify-between shadow-sm">
    <div>
      <h2 class="text-[17px] font-bold text-slate-800 tracking-tight">Request Leave & Delegate Coverage</h2>
      <p class="text-[11px] text-slate-400 font-semibold mt-0.5">Define absence period and assign temporary coverage access</p>
    </div>
    <button 
      @click="showRequestDrawer = false" 
      class="p-2 text-slate-400 hover:text-slate-600 rounded-xl hover:bg-slate-50 transition"
      type="button"
    >
      <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
      </svg>
    </button>
  </div>

  <!-- Form Body -->
  <form 
    action="{% url 'frontend:request_leave_drawer' %}" 
    method="POST" 
    enctype="multipart/form-data"
    class="flex-1 overflow-y-auto p-6 space-y-6"
    id="leave-request-form"
  >
    {% csrf_token %}

    <!-- Leave Type -->
    <div class="space-y-1.5">
      <label class="block text-[11px] font-bold uppercase text-slate-400 tracking-wider">Leave Category</label>
      <select 
        name="type" 
        x-model="leaveType"
        @change="updateMetrics()"
        class="w-full bg-white border border-slate-200 rounded-xl px-4 py-3 text-[13px] font-semibold text-slate-700 focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-600 transition"
        required
      >
        {% for p in policies %}
        <option value="{{ p.leave_type }}" data-requires-attachment="{% if p.requires_attachment %}true{% else %}false{% endif %}">
          {{ p.label }} ({{ p.annual_entitlement }} days/yr)
        </option>
        {% endfor %}
      </select>
    </div>

    <!-- Dates Picker Grid -->
    <div class="grid grid-cols-2 gap-4">
      <div class="space-y-1.5">
        <label class="block text-[11px] font-bold uppercase text-slate-400 tracking-wider">Start Date</label>
        <input 
          type="date" 
          name="start_date" 
          x-model="startDate"
          @change="updateMetrics()"
          min="{{ tomorrow }}"
          class="w-full bg-white border border-slate-200 rounded-xl px-4 py-3 text-[13px] font-semibold text-slate-700 focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-600 transition"
          required
        />
      </div>

      <div class="space-y-1.5">
        <label class="block text-[11px] font-bold uppercase text-slate-400 tracking-wider">End Date</label>
        <input 
          type="date" 
          name="end_date" 
          x-model="endDate"
          @change="updateMetrics()"
          min="{{ tomorrow }}"
          class="w-full bg-white border border-slate-200 rounded-xl px-4 py-3 text-[13px] font-semibold text-slate-700 focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-600 transition"
          required
        />
      </div>
    </div>

    <!-- Dynamic Metrics Box -->
    <div 
      x-show="loading || daysCharged > 0" 
      class="bg-indigo-50/50 border border-indigo-100 rounded-2xl p-4 transition-all"
      style="display: none;"
    >
      <template x-if="loading">
        <div class="flex items-center gap-2 justify-center py-2">
          <span class="w-4 h-4 border-2 border-slate-200 border-t-indigo-600 rounded-full animate-spin"></span>
          <span class="text-[12px] text-indigo-700 font-semibold">Calculating entitlement impact...</span>
        </div>
      </template>
      
      <template x-if="!loading && daysCharged > 0">
        <div class="space-y-2">
          <div class="flex justify-between items-center text-[12px] text-slate-650 font-bold">
            <span>Working Days Charged:</span>
            <span class="text-[14px] font-extrabold text-indigo-650" x-text="daysCharged + ' days'"></span>
          </div>
          <div class="flex justify-between items-center text-[11px] text-slate-450 font-semibold">
            <span>Calendar Duration:</span>
            <span x-text="calendarDays + ' calendar days'"></span>
          </div>
          
          <div class="grid grid-cols-2 gap-2 text-[10.5px] text-slate-500 bg-white p-2.5 rounded-xl border border-indigo-100/50 mt-2">
            <div>• Weekends: <span class="font-bold text-slate-700" x-text="weekendsSkipped + ' skipped'"></span></div>
            <div>• Holidays: <span class="font-bold text-slate-700" x-text="publicHolidaysSkipped + ' skipped'"></span></div>
            <div>• Blackout Dates: <span class="font-bold text-slate-700" x-text="blackoutDatesSkipped + ' skipped'"></span></div>
            <div>• Conference Week: <span class="font-bold text-slate-700" x-text="staffConferenceOverlap ? 'Yes (Overlaps)' : 'No'"></span></div>
          </div>

          <div class="flex justify-between items-center text-[11px] text-slate-550 font-semibold border-t border-indigo-50/50 pt-2 mt-2">
            <span>Affected Field Activities:</span>
            <span class="font-extrabold text-rose-600" x-text="affectedActivitiesCount + ' activities'"></span>
          </div>
          
          <div class="flex justify-between items-center text-[12px] text-slate-600 font-semibold border-t border-indigo-50/50 pt-2 mt-1">
            <span>Entitlement Balance Remaining:</span>
            <span x-text="balanceRemaining + ' days'"></span>
          </div>
          
          <!-- Insufficient Balance Warning -->
          <div 
            x-show="insufficientBalance" 
            class="bg-rose-50 border border-rose-100 rounded-xl p-3 flex gap-2 text-rose-700 text-[11px] font-semibold mt-2"
          >
            <span>⚠️</span>
            <span><strong>Warning:</strong> You do not have enough remaining balance for this request. It will be routed for special PL/CD exception review.</span>
          </div>

          <!-- Blackout Date Warning -->
          <div 
            x-show="hasBlackout" 
            class="bg-amber-50 border border-amber-200 rounded-xl p-3 flex gap-2 text-amber-700 text-[11px] font-semibold mt-2"
          >
            <span>🚫</span>
            <span><strong>Blocked / Blackout Overlap:</strong> <span x-text="blackoutReason"></span></span>
          </div>
        </div>
      </template>
    </div>

    <!-- Coverage assignment -->
    <div class="space-y-3">
      <label class="block text-[11px] font-bold uppercase text-slate-400 tracking-wider">Temporary Coverage Person</label>
      
      <template x-if="candidates.length > 0">
        <select 
          name="covering_staff" 
          class="w-full bg-white border border-slate-200 rounded-xl px-4 py-3 text-[13px] font-semibold text-slate-700 focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-600 transition"
          required
        >
          <option value="">-- Choose eligible team member --</option>
          <template x-for="c in candidates" :key="c.id">
            <option :value="c.id" x-text="c.name + ' (' + c.role + ' · Active Workload: ' + c.workload + ')'"></option>
          </template>
        </select>
      </template>
      
      <template x-if="candidates.length === 0 && (startDate && endDate)">
        <div class="p-4 rounded-xl border border-rose-100 bg-rose-50/50 text-rose-700 text-[12px] font-semibold">
          No eligible team members are available to cover you on these dates. Try scheduling for another period.
        </div>
      </template>
      
      <template x-if="!startDate || !endDate">
        <div class="p-4 rounded-xl border border-slate-100 bg-slate-50 text-slate-400 text-[12px] font-semibold text-center">
          Choose date range above to load eligible coverage staff.
        </div>
      </template>
    </div>

    <!-- Handover notes -->
    <div class="space-y-1.5">
      <label class="block text-[11px] font-bold uppercase text-slate-400 tracking-wider">Handover & Coverage Notes</label>
      <textarea 
        name="coverage_notes" 
        rows="3"
        placeholder="Provide handover instructions, specific schools to visit, and coverage details..."
        class="w-full bg-white border border-slate-200 rounded-xl px-4 py-3 text-[13px] font-semibold text-slate-700 focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-600 transition"
        required
      ></textarea>
    </div>

    <!-- Urgent Activities -->
    <div class="space-y-1.5">
      <label class="block text-[11px] font-bold uppercase text-slate-400 tracking-wider">Urgent Activities (During Leave)</label>
      <textarea 
        name="urgent_activities" 
        rows="2"
        placeholder="Are there any actions/slots during this period that require immediate execution?"
        class="w-full bg-white border border-slate-200 rounded-xl px-4 py-3 text-[13px] font-semibold text-slate-700 focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-600 transition"
      ></textarea>
    </div>

    <!-- Emergency contacts -->
    <div class="space-y-1.5">
      <label class="block text-[11px] font-bold uppercase text-slate-400 tracking-wider">Emergency Contact</label>
      <input 
        type="text" 
        name="emergency_contact" 
        placeholder="e.g. Jane Doe (+256 700 000 000)"
        class="w-full bg-white border border-slate-200 rounded-xl px-4 py-3 text-[13px] font-semibold text-slate-700 focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-600 transition"
        required
      />
    </div>

    <!-- Attachment -->
    <div class="space-y-1.5" x-show="requiresAttachment" style="display: none;">
      <label class="block text-[11px] font-bold uppercase text-slate-400 tracking-wider">Supporting Attachment (Required)</label>
      <input 
        type="file" 
        name="attachment" 
        :required="requiresAttachment"
        class="w-full bg-white border border-slate-200 rounded-xl px-4 py-2.5 text-[12px] font-semibold text-slate-700 focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-600 transition"
      />
      <span class="text-[10px] text-slate-400 block mt-0.5">Please upload a medical certificate or formal document.</span>
    </div>

    <!-- Reason -->
    <div class="space-y-1.5">
      <label class="block text-[11px] font-bold uppercase text-slate-400 tracking-wider">General Submitter Comments</label>
      <textarea 
        name="reason" 
        rows="2"
        placeholder="Optional comment to your Program Lead / CD reviewer..."
        class="w-full bg-white border border-slate-200 rounded-xl px-4 py-3 text-[13px] font-semibold text-slate-700 focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-600 transition"
      ></textarea>
    </div>

  </form>

  <!-- Footer Actions -->
  <div class="px-6 py-4 bg-white border-t border-slate-100 flex items-center justify-end gap-3 shadow-lg">
    <button 
      @click="showRequestDrawer = false" 
      class="px-4 py-2.5 border border-slate-200 hover:bg-slate-50 text-slate-700 text-[11px] font-bold uppercase rounded-xl tracking-wider transition"
      type="button"
    >
      Cancel
    </button>
    <button 
      type="submit" 
      form="leave-request-form"
      :disabled="loading || candidates.length === 0"
      class="px-5 py-2.5 bg-indigo-600 hover:bg-indigo-700 disabled:bg-slate-300 disabled:cursor-not-allowed text-white text-[11px] font-bold uppercase rounded-xl tracking-wider shadow-sm transition"
    >
      Submit Request
    </button>
  </div>

</div>

<script>
  function leaveRequestForm() {
    return {
      leaveType: 'personal_time_off',
      startDate: '',
      endDate: '',
      candidates: [],
      daysCharged: 0,
      calendarDays: 0,
      balanceRemaining: 0,
      insufficientBalance: false,
      requiresAttachment: false,
      weekendsSkipped: 0,
      publicHolidaysSkipped: 0,
      blackoutDatesSkipped: 0,
      staffConferenceOverlap: false,
      affectedActivitiesCount: 0,
      hasBlackout: false,
      blackoutReason: '',
      loading: false,

      updateMetrics() {
        if (!this.startDate || !this.endDate) return;
        
        // Find if attachment required
        const select = document.getElementsByName('type')[0];
        if (select) {
          const selectedOpt = select.options[select.selectedIndex];
          if (selectedOpt) {
            this.requiresAttachment = selectedOpt.getAttribute('data-requires-attachment') === 'true';
          }
        }

        this.loading = true;
        
        // Call backend API
        const url = `/personal-time-off/eligible-cover?start_date=${this.startDate}&end_date=${this.endDate}&type=${this.leaveType}`;
        fetch(url)
          .then(res => res.json())
          .then(data => {
            this.loading = false;
            if (data.error) {
              this.candidates = [];
              this.daysCharged = 0;
              this.calendarDays = 0;
              this.balanceRemaining = 0;
              this.insufficientBalance = false;
              this.weekendsSkipped = 0;
              this.publicHolidaysSkipped = 0;
              this.blackoutDatesSkipped = 0;
              this.staffConferenceOverlap = false;
              this.affectedActivitiesCount = 0;
              this.hasBlackout = false;
              this.blackoutReason = '';
            } else {
              this.candidates = data.candidates;
              this.daysCharged = data.days_charged;
              this.calendarDays = data.calendar_days;
              this.balanceRemaining = data.balance_remaining;
              this.insufficientBalance = data.insufficient_balance;
              this.weekendsSkipped = data.weekends_skipped;
              this.publicHolidaysSkipped = data.public_holidays_skipped;
              this.blackoutDatesSkipped = data.blackout_dates_skipped;
              this.staffConferenceOverlap = data.staff_conference_overlap;
              this.affectedActivitiesCount = data.affected_activities_count;
              this.hasBlackout = data.has_blackout;
              this.blackoutReason = data.blackout_reason;
              
              // Dynamic attachment gating rule for sick leaves > 2 days
              if (this.leaveType === 'sick_leave' && this.daysCharged > 2) {
                this.requiresAttachment = true;
              }
            }
          })
          .catch(() => {
            this.loading = false;
          });
      }
    };
  }
</script>
