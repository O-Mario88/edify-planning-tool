<div class="pto-request-form h-full flex flex-col justify-between bg-slate-50" x-data="leaveRequestForm('{% url 'frontend:eligible_cover_api' %}')">

  <!-- Header -->
  <div class="px-6 py-5 edify-surface border-b border-slate-100 flex items-center justify-between shadow-sm">
    <div>
      <h2 class="text-[17px] font-semibold text-slate-800 tracking-tight">Request Leave &amp; Delegate Coverage</h2>
      <p class="edify-text-caption text-slate-400 font-normal mt-0.5">Define the absence period and assign temporary coverage access.</p>
    </div>
    <button
      @click="closeRequestDrawer()"
      aria-label="Close leave request"
      class="p-2 text-slate-400 hover:text-slate-600 rounded-control hover:bg-slate-50 transition"
      type="button"
    >
      <svg aria-hidden="true" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
      </svg>
    </button>
  </div>

  <!-- Form Body -->
  <form
    action="{% url 'frontend:request_leave_drawer' %}"
    method="POST"
    enctype="multipart/form-data"
    class="flex-1 overflow-y-auto p-4 sm:p-6 space-y-5 sm:space-y-6"
    id="leave-request-form"
  >
    {% csrf_token %}

    <!-- Leave Type -->
    <div class="space-y-1.5">
      <label for="leave-request-type" class="block edify-text-caption font-semibold uppercase text-slate-400 tracking-wider">Leave category</label>
      <select
        id="leave-request-type"
        name="type"
        x-model="leaveType"
        @change="updateMetrics()"
        class="w-full edify-surface border border-slate-200 rounded-control px-4 py-3 text-[13px] font-normal text-slate-700 focus:ring-2 edify-primary-focus edify-primary-focus transition"
        required
      >
        {% for p in policies %}
        <option value="{{ p.leave_type }}" data-requires-attachment="{% if p.requires_attachment %}true{% else %}false{% endif %}">
          {{ p.label }} ({{ p.annual_entitlement }} days/yr)
        </option>
        {% endfor %}
      </select>
    </div>

    <!-- Dates Picker Grid -->
    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
      <div class="space-y-1.5">
        <label for="leave-request-start" class="block edify-text-caption font-semibold uppercase text-slate-400 tracking-wider">Start date</label>
        <input
          id="leave-request-start"
          type="date"
          name="start_date"
          x-model="startDate"
          @change="updateMetrics()"
          min="{{ tomorrow }}"
          class="w-full edify-surface border border-slate-200 rounded-control px-4 py-3 text-[13px] font-normal text-slate-700 focus:ring-2 edify-primary-focus edify-primary-focus transition"
          required
        />
      </div>

      <div class="space-y-1.5">
        <label for="leave-request-end" class="block edify-text-caption font-semibold uppercase text-slate-400 tracking-wider">End date</label>
        <input
          id="leave-request-end"
          type="date"
          name="end_date"
          x-model="endDate"
          @change="updateMetrics()"
          :min="startDate || '{{ tomorrow }}'"
          class="w-full edify-surface border border-slate-200 rounded-control px-4 py-3 text-[13px] font-normal text-slate-700 focus:ring-2 edify-primary-focus edify-primary-focus transition"
          required
        />
      </div>
    </div>

    <!-- Dynamic Metrics Box -->
    <div
      x-show="loading || daysCharged > 0"
      class="edify-primary-soft-alpha-50 border edify-primary-border rounded-surface p-4 transition-all"
      style="display: none;"
      aria-live="polite"
    >
      <template x-if="loading">
        <div class="flex items-center gap-2 justify-center py-2">
          <span aria-hidden="true" class="w-4 h-4 border-2 border-slate-200 border-t-indigo-600 rounded-pill animate-spin"></span>
          <span class="text-[12px] edify-primary-text font-medium">Calculating entitlement impact…</span>
        </div>
      </template>

      <template x-if="!loading && daysCharged > 0">
        <div class="space-y-2">
          <div class="flex justify-between items-center text-[12px] text-slate-700 font-medium">
            <span>Working days charged</span>
            <span class="text-[14px] font-semibold edify-primary-text" x-text="daysCharged + ' days'"></span>
          </div>
          <div class="flex justify-between items-center edify-text-caption text-slate-500 font-medium">
            <span>Calendar duration</span>
            <span x-text="calendarDays + ' calendar days'"></span>
          </div>

          <div class="grid grid-cols-2 gap-2 edify-text-caption text-slate-500 edify-surface p-2.5 rounded-surface border edify-primary-border-alpha-50 mt-2">
            <div>• Weekends: <span class="font-medium text-slate-700" x-text="weekendsSkipped + ' skipped'"></span></div>
            <div>• Holidays: <span class="font-medium text-slate-700" x-text="publicHolidaysSkipped + ' skipped'"></span></div>
            <div>• Blackout dates: <span class="font-medium text-slate-700" x-text="blackoutDatesSkipped + ' skipped'"></span></div>
            <div>• Conference week: <span class="font-medium text-slate-700" x-text="staffConferenceOverlap ? 'Yes (overlaps)' : 'No'"></span></div>
          </div>

          <div class="flex justify-between items-center edify-text-caption text-slate-600 font-medium border-t edify-primary-border-alpha-50 pt-2 mt-2">
            <span>Affected field activities</span>
            <span class="font-semibold text-rose-600" x-text="affectedActivitiesCount + ' activities'"></span>
          </div>

          <div class="flex justify-between items-center text-[12px] text-slate-600 font-medium border-t edify-primary-border-alpha-50 pt-2 mt-1">
            <span>Entitlement balance remaining</span>
            <span x-text="balanceRemaining + ' days'"></span>
          </div>

          <!-- Insufficient Balance Warning -->
          <div
            x-show="insufficientBalance"
            class="bg-rose-50 border border-rose-100 rounded-surface p-3 flex gap-2 text-rose-700 edify-text-caption font-medium mt-2"
          >
            <span><svg class="inline-block h-[1em] w-[1em] align-[-0.12em]" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.9" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v4m0 4h.01M10.3 3.9L1.8 18a2 2 0 001.7 3h17a2 2 0 001.7-3L14.7 3.9a2 2 0 00-3.4 0z"/></svg></span>
            <span><strong>Warning:</strong> You do not have enough remaining balance for this request. It will be routed for special PL/CD exception review.</span>
          </div>

          <!-- Blackout Date Warning -->
          <div
            x-show="hasBlackout"
            class="bg-amber-50 border border-amber-200 rounded-surface p-3 flex gap-2 text-amber-700 edify-text-caption font-medium mt-2"
          >
            <span><svg class="inline-block h-[1em] w-[1em] align-[-0.12em]" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.9" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="M18.4 5.6a9 9 0 11-12.8 12.8 9 9 0 0112.8-12.8zm0 0L5.6 18.4"/></svg></span>
            <span><strong>Blocked / Blackout Overlap:</strong> <span x-text="blackoutReason"></span></span>
          </div>
        </div>
      </template>
    </div>

    <div x-show="errorMessage" x-cloak role="alert" class="bg-rose-50 border border-rose-100 rounded-surface p-3 text-rose-700 edify-text-caption font-medium" x-text="errorMessage"></div>

    <!-- Coverage assignment -->
    <div class="space-y-3">
      <label for="leave-request-cover" class="block edify-text-caption font-semibold uppercase text-slate-400 tracking-wider">Temporary coverage person</label>

      <template x-if="loading">
        <div role="status" class="p-4 rounded-surface border border-slate-100 bg-slate-50 text-slate-500 text-[12px] font-normal text-center">Checking team availability…</div>
      </template>

      <template x-if="candidates.length > 0">
        <select
          id="leave-request-cover"
          name="covering_staff"
          class="w-full edify-surface border border-slate-200 rounded-control px-4 py-3 text-[13px] font-normal text-slate-700 focus:ring-2 edify-primary-focus edify-primary-focus transition"
          required
        >
          <option value="">-- Choose eligible team member --</option>
          <template x-for="c in candidates" :key="c.id">
            <option :value="c.id" x-text="c.name + ' — ' + formatRole(c.role)"></option>
          </template>
        </select>
      </template>

      <template x-if="candidates.length === 0 && (startDate && endDate) && !loading && !errorMessage">
        <div class="p-4 rounded-surface border border-rose-100 bg-rose-50/50 text-rose-700 text-[12px] font-medium">
          No eligible team members are available to cover you on these dates. Try scheduling for another period.
        </div>
      </template>

      <template x-if="(!startDate || !endDate) && !loading">
        <div class="p-4 rounded-surface border border-slate-100 bg-slate-50 text-slate-400 text-[12px] font-normal text-center">
          Choose date range above to load eligible coverage staff.
        </div>
      </template>
    </div>

    <!-- Handover notes -->
    <div class="space-y-1.5">
      <label for="leave-request-coverage-notes" class="block edify-text-caption font-semibold uppercase text-slate-400 tracking-wider">Handover &amp; coverage notes</label>
      <textarea
        id="leave-request-coverage-notes"
        name="coverage_notes"
        rows="3"
        placeholder="Provide handover instructions, specific schools to visit, and coverage details..."
        class="w-full edify-surface border border-slate-200 rounded-control px-4 py-3 text-[13px] font-normal text-slate-700 focus:ring-2 edify-primary-focus edify-primary-focus transition"
        required
      ></textarea>
    </div>

    <!-- Urgent Activities -->
    <div class="space-y-1.5">
      <label for="leave-request-urgent-activities" class="block edify-text-caption font-semibold uppercase text-slate-400 tracking-wider">Urgent activities during leave</label>
      <textarea
        id="leave-request-urgent-activities"
        name="urgent_activities"
        rows="2"
        placeholder="Are there any actions/slots during this period that require immediate execution?"
        class="w-full edify-surface border border-slate-200 rounded-control px-4 py-3 text-[13px] font-normal text-slate-700 focus:ring-2 edify-primary-focus edify-primary-focus transition"
      ></textarea>
    </div>

    <!-- Emergency contacts -->
    <div class="space-y-1.5">
      <label for="leave-request-emergency-contact" class="block edify-text-caption font-semibold uppercase text-slate-400 tracking-wider">Emergency contact</label>
      <input
        id="leave-request-emergency-contact"
        type="text"
        name="emergency_contact"
        placeholder="e.g. Jane Doe (+256 700 000 000)"
        class="w-full edify-surface border border-slate-200 rounded-control px-4 py-3 text-[13px] font-normal text-slate-700 focus:ring-2 edify-primary-focus edify-primary-focus transition"
        required
      />
    </div>

    <!-- Attachment -->
    <div class="space-y-1.5" x-show="requiresAttachment" style="display: none;">
      <label for="leave-request-attachment" class="block edify-text-caption font-semibold uppercase text-slate-400 tracking-wider">Supporting attachment <span class="normal-case tracking-normal font-normal">(required)</span></label>
      <input
        id="leave-request-attachment"
        type="file"
        name="attachment"
        :required="requiresAttachment"
        accept=".pdf,.jpg,.jpeg,.png"
        aria-describedby="leave-request-attachment-hint"
        class="w-full edify-surface border border-slate-200 rounded-control px-4 py-2.5 text-[12px] font-normal text-slate-700 focus:ring-2 edify-primary-focus edify-primary-focus transition"
      />
      <span id="leave-request-attachment-hint" class="edify-text-caption text-slate-400 block mt-0.5">PDF, JPG or PNG medical certificate or formal document.</span>
    </div>

    <!-- Reason -->
    <div class="space-y-1.5">
      <label for="leave-request-reason" class="block edify-text-caption font-semibold uppercase text-slate-400 tracking-wider">Comments for the reviewer <span class="normal-case tracking-normal font-normal">(optional)</span></label>
      <textarea
        id="leave-request-reason"
        name="reason"
        rows="2"
        placeholder="Optional comment to your Program Lead / CD reviewer..."
        class="w-full edify-surface border border-slate-200 rounded-control px-4 py-3 text-[13px] font-normal text-slate-700 focus:ring-2 edify-primary-focus edify-primary-focus transition"
      ></textarea>
    </div>

  </form>

  <!-- Footer Actions -->
  <div class="px-4 sm:px-6 py-4 edify-surface border-t border-slate-100 flex flex-col-reverse sm:flex-row items-stretch sm:items-center justify-end gap-2 sm:gap-3">
    <button
      @click="closeRequestDrawer()"
      class="btn btn-ghost min-h-10"
      type="button"
    >
      Cancel
    </button>
    <button
      type="submit"
      form="leave-request-form"
      :disabled="loading || !startDate || !endDate || candidates.length === 0 || insufficientBalance || errorMessage"
      class="btn btn-primary min-h-10"
    >
      Submit Request
    </button>
  </div>

</div>
