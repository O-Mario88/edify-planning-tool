{% comment %}Mini project list card. Params: title, tone (success|warning|danger), rows, empty{% endcomment %}
<div class="card p-4">
  <div class="flex items-center gap-2 mb-3">
    <span class="h-2 w-2 rounded-full shrink-0 {% if tone == 'success' %}bg-emerald-500{% elif tone == 'warning' %}bg-amber-500{% elif tone == 'danger' %}bg-rose-500{% else %}bg-slate-400{% endif %}"></span>
    <h3 class="text-[13px] font-semibold text-slate-800 tracking-tight">{{ title }}</h3>
  </div>
  <div class="space-y-2">
    {% for r in rows %}
    <div class="flex items-center justify-between gap-2">
      <span class="text-[12px] font-bold text-slate-700 truncate">{{ r.name }}</span>
      {% include "partials/projects/delta_pill.html" with delta=r.delta %}
    </div>
    {% empty %}
    <p class="text-[11.5px] font-semibold text-slate-400 py-3 text-center">{{ empty }}</p>
    {% endfor %}
  </div>
</div>
