{% comment %}Special-projects planning tab (client-side filter). Params: key, label, count{% endcomment %}
<button type="button" @click="tab = '{{ key }}'"
        :class="tab === '{{ key }}' ? 'bg-blue-50 text-blue-700 ring-1 ring-blue-100' : 'text-slate-500 hover:bg-slate-50'"
        class="shrink-0 h-9 px-3 rounded-control text-[12px] font-bold transition-all inline-flex items-center gap-1.5 mb-[-1px]">
  {{ label }}
  <span class="px-1.5 py-px rounded-pill edify-text-caption tabular-nums bg-slate-100 text-slate-500">{{ count }}</span>
</button>
