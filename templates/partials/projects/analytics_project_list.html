<section class="spa-card spa-project-list spa-tone--{{ tone }}"><header><h2>{{ title }}</h2></header><ol>{% for item in rows %}<li><span>{{ forloop.counter }}</span><a href="{{ item.url }}"><strong>{{ item.name }}</strong><small>{{ item.interventions }} · {{ item.classification }}</small></a><b>{% if item.impact_score is not None %}{{ item.impact_score }}{% else %}—{% endif %}</b></li>{% empty %}<li class="spa-muted">{{ empty }}</li>{% endfor %}</ol></section>
