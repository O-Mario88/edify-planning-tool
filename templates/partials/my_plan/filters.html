<!-- Filters Form for My Plan -->
<form id="filters-form" method="GET" action="/my-plan"
hx-get="/my-plan"
hx-target="#my-plan-workspace"
hx-swap="innerHTML"
hx-push-url="true"
class="flex flex-wrap items-center gap-2.5 edify-surface p-3 border border-slate-200 rounded-surface shadow-sm"
>
<!-- Keep period and other tabs active state -->
<input type="hidden" name="period" value="{{ period }}">

<!-- FY Filter -->
<div class="flex flex-col min-w-[90px]">
<select name="fy" hx-trigger="change" class="h-9 px-3 text-[12px] font-semibold bg-slate-50 border border-slate-200 rounded-control edify-focus-surface focus:outline-none transition-all">
<option value="2023" {% if fy == "2023" %}selected{% endif %}>FY 2023</option>
<option value="2024" {% if fy == "2024" %}selected{% endif %}>FY 2024</option>
<option value="2025" {% if fy == "2025" %}selected{% endif %}>FY 2025</option>
<option value="2026" {% if fy == "2026" %}selected{% endif %}>FY 2026</option>
</select>
</div>

<!-- Quarter Filter -->
<div class="flex flex-col min-w-[100px]">
<select name="quarter" hx-trigger="change" class="h-9 px-3 text-[12px] font-semibold bg-slate-50 border border-slate-200 rounded-control edify-focus-surface focus:outline-none transition-all">
{% for q in quarters %}
<option value="{{ q }}" {% if selected_quarter == q %}selected{% endif %}>Quarter: {{ q }}</option>
{% endfor %}
</select>
</div>

<!-- Month Filter -->
<div class="flex flex-col min-w-[110px]">
<select name="month" hx-trigger="change" class="h-9 px-3 text-[12px] font-semibold bg-slate-50 border border-slate-200 rounded-control edify-focus-surface focus:outline-none transition-all">
{% for m in months %}
<option value="{{ m.val }}" {% if selected_month == m.val %}selected{% endif %}>Month: {{ m.label }}</option>
{% endfor %}
</select>
</div>

<!-- Week Filter -->
<div class="flex flex-col min-w-[160px]">
<select name="week" hx-trigger="change" class="h-9 px-3 text-[12px] font-semibold bg-slate-50 border border-slate-200 rounded-control edify-focus-surface focus:outline-none transition-all">
{% for w in weeks %}
<option value="{{ w.val }}" {% if selected_week == w.val %}selected{% endif %}>Week: {{ w.label }}</option>
{% endfor %}
</select>
</div>

<!-- District Filter -->
<div class="flex flex-col min-w-[120px]">
<select name="district" hx-trigger="change" class="h-9 px-3 text-[12px] font-semibold bg-slate-50 border border-slate-200 rounded-control edify-focus-surface focus:outline-none transition-all">
<option value="all">District: All</option>
{% for d in districts %}
<option value="{{ d.id }}" {% if selected_district == d.id %}selected{% endif %}>{{ d.name }}</option>
{% endfor %}
</select>
</div>

<!-- Staff Filter -->
<div class="flex flex-col min-w-[130px]">
<select name="staff" hx-trigger="change" class="h-9 px-3 text-[12px] font-semibold bg-slate-50 border border-slate-200 rounded-control edify-focus-surface focus:outline-none transition-all">
<option value="all">Staff: All</option>
{% for s in staff_users %}
<option value="{{ s.id }}" {% if selected_staff == s.id %}selected{% endif %}>{{ s.name }}</option>
{% endfor %}
</select>
</div>

<!-- Activity Type Filter -->
<div class="flex flex-col min-w-[140px]">
<select name="activity_type" hx-trigger="change" class="h-9 px-3 text-[12px] font-semibold bg-slate-50 border border-slate-200 rounded-control edify-focus-surface focus:outline-none transition-all">
<option value="all" {% if not selected_activity_type or selected_activity_type == 'all' %}selected{% endif %}>Activity Type: All</option>
<option value="school_visit" {% if selected_activity_type == 'school_visit' %}selected{% endif %}>School Visit</option>
<option value="cluster_training" {% if selected_activity_type == 'cluster_training' %}selected{% endif %}>Cluster Training</option>
<option value="cluster_meeting" {% if selected_activity_type == 'cluster_meeting' %}selected{% endif %}>Cluster Meeting</option>
</select>
</div>

<!-- Status Filter -->
<div class="flex flex-col min-w-[120px]">
<select name="status" hx-trigger="change" class="h-9 px-3 text-[12px] font-semibold bg-slate-50 border border-slate-200 rounded-control edify-focus-surface focus:outline-none transition-all">
<option value="all" {% if not selected_status or selected_status == 'all' %}selected{% endif %}>Status: All</option>
<option value="scheduled" {% if selected_status == 'scheduled' %}selected{% endif %}>Scheduled</option>
<option value="completed" {% if selected_status == 'completed' %}selected{% endif %}>Completed</option>
<option value="submitted" {% if selected_status == 'submitted' %}selected{% endif %}>Submitted</option>
<option value="returned_for_correction" {% if selected_status == 'returned_for_correction' %}selected{% endif %}>Returned</option>
</select>
</div>
</form>
