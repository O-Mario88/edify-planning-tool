<!-- Period Segmented Tabs for My Plan -->
<div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4 border-b border-slate-200 pb-3">

<!-- Left Side: Segmented Tabs Control -->
<div class="flex items-center gap-1.5 bg-slate-100 p-1 rounded-surface" role="tablist" aria-label="Plan period">
<button
type="button"
id="my-plan-tab-week"
role="tab"
aria-controls="my-plan-workspace"
aria-selected="{% if period == 'week' %}true{% else %}false{% endif %}"
tabindex="{% if period == 'week' %}0{% else %}-1{% endif %}"
hx-get="/my-plan"
hx-target="#my-plan-workspace"
hx-swap="innerHTML"
hx-push-url="true"
hx-include="#filters-form"
@click="document.querySelector('#filters-form [name=period]').value = 'week'"
class="px-4.5 py-1.5 text-[12px] font-bold rounded-control transition-all {% if period == 'week' %}btn-premium-primary text-white shadow-sm{% else %}text-slate-500 hover:text-slate-800 hover:bg-slate-200/50{% endif %}"
>
Week
</button>

<button
type="button"
id="my-plan-tab-month"
role="tab"
aria-controls="my-plan-workspace"
aria-selected="{% if period == 'month' %}true{% else %}false{% endif %}"
tabindex="{% if period == 'month' %}0{% else %}-1{% endif %}"
hx-get="/my-plan"
hx-target="#my-plan-workspace"
hx-swap="innerHTML"
hx-push-url="true"
hx-include="#filters-form"
@click="document.querySelector('#filters-form [name=period]').value = 'month'"
class="px-4.5 py-1.5 text-[12px] font-bold rounded-control transition-all {% if period == 'month' %}btn-premium-primary text-white shadow-sm{% else %}text-slate-500 hover:text-slate-800 hover:bg-slate-200/50{% endif %}"
>
Month
</button>

<button
type="button"
id="my-plan-tab-quarter"
role="tab"
aria-controls="my-plan-workspace"
aria-selected="{% if period == 'quarter' %}true{% else %}false{% endif %}"
tabindex="{% if period == 'quarter' %}0{% else %}-1{% endif %}"
hx-get="/my-plan"
hx-target="#my-plan-workspace"
hx-swap="innerHTML"
hx-push-url="true"
hx-include="#filters-form"
@click="document.querySelector('#filters-form [name=period]').value = 'quarter'"
class="px-4.5 py-1.5 text-[12px] font-bold rounded-control transition-all {% if period == 'quarter' %}btn-premium-primary text-white shadow-sm{% else %}text-slate-500 hover:text-slate-800 hover:bg-slate-200/50{% endif %}"
>
Quarter
</button>

<button
type="button"
id="my-plan-tab-fy"
role="tab"
aria-controls="my-plan-workspace"
aria-selected="{% if period == 'fy' %}true{% else %}false{% endif %}"
tabindex="{% if period == 'fy' %}0{% else %}-1{% endif %}"
hx-get="/my-plan"
hx-target="#my-plan-workspace"
hx-swap="innerHTML"
hx-push-url="true"
hx-include="#filters-form"
@click="document.querySelector('#filters-form [name=period]').value = 'fy'"
class="px-4.5 py-1.5 text-[12px] font-bold rounded-control transition-all {% if period == 'fy' %}btn-premium-primary text-white shadow-sm{% else %}text-slate-500 hover:text-slate-800 hover:bg-slate-200/50{% endif %}"
>
FY
</button>
</div>

<!-- Middle Section: Selected Period Range display label -->
<div class="text-[12px] font-bold text-slate-700 flex items-center gap-1.5">
<span class="text-slate-400">Showing plans for</span>
<span class="text-[var(--edify-text)] font-semibold">{{ period_label }}</span>
</div>

<!-- Right Side: View Calendar button -->
<div>
<a href="/calendar" class="btn btn-ghost h-9 text-[12px] shadow-sm">
<span><svg class="inline-block h-[1em] w-[1em] align-[-0.12em]" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.9" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="M8 7V3m8 4V3M4 11h16M5 5h14a1 1 0 011 1v13a1 1 0 01-1 1H5a1 1 0 01-1-1V6a1 1 0 011-1z"/></svg></span>
<span>View Calendar</span>
</a>
</div>

</div>
