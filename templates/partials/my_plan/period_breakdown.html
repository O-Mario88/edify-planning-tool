<!-- Bottom Period Breakdown Section -->
<div class="card p-5">
<div class="mb-4">
<h3 class="text-[15px] font-extrabold text-[#2e505f] tracking-tight">Plan Breakdown by Period</h3>
<p class="text-[12px] text-slate-400 font-bold mt-0.5">All activity types combined</p>
</div>

<div class="grid grid-cols-2 sm:grid-cols-4 gap-4">
<!-- This Week -->
<div class="flex items-center gap-3 bg-slate-50 border border-slate-100 rounded-xl p-3.5 hover:border-[var(--edify-primary)]/20 transition-all">
<div class="h-9 w-9 rounded-lg bg-blue-50 text-blue-600 flex items-center justify-center text-[18px]">📅</div>
<div>
<p class="text-[11px] font-extrabold uppercase tracking-wider text-slate-400">This Week</p>
<p class="text-[18px] font-black text-slate-800 leading-tight mt-0.5">{{ breakdown.week }} <span class="text-[11px] text-slate-400 font-bold">activities</span></p>
</div>
</div>

<!-- This Month -->
<div class="flex items-center gap-3 bg-slate-50 border border-slate-100 rounded-xl p-3.5 hover:border-[var(--edify-primary)]/20 transition-all">
<div class="h-9 w-9 rounded-lg bg-green-50 text-green-600 flex items-center justify-center text-[18px]">📈</div>
<div>
<p class="text-[11px] font-extrabold uppercase tracking-wider text-slate-400">This Month</p>
<p class="text-[18px] font-black text-slate-800 leading-tight mt-0.5">{{ breakdown.month }} <span class="text-[11px] text-slate-400 font-bold">activities</span></p>
</div>
</div>

<!-- This Quarter -->
<div class="flex items-center gap-3 bg-slate-50 border border-slate-100 rounded-xl p-3.5 hover:border-[var(--edify-primary)]/20 transition-all">
<div class="h-9 w-9 rounded-lg bg-purple-50 text-purple-600 flex items-center justify-center text-[18px]">📊</div>
<div>
<p class="text-[11px] font-extrabold uppercase tracking-wider text-slate-400">This Quarter</p>
<p class="text-[18px] font-black text-slate-800 leading-tight mt-0.5">{{ breakdown.quarter }} <span class="text-[11px] text-slate-400 font-bold">activities</span></p>
</div>
</div>

<!-- This FY -->
<div class="flex items-center gap-3 bg-slate-50 border border-slate-100 rounded-xl p-3.5 hover:border-[var(--edify-primary)]/20 transition-all">
<div class="h-9 w-9 rounded-lg bg-orange-50 text-orange-600 flex items-center justify-center text-[18px]">🗓</div>
<div>
<p class="text-[11px] font-extrabold uppercase tracking-wider text-slate-400">This FY</p>
<p class="text-[18px] font-black text-slate-800 leading-tight mt-0.5">{{ breakdown.fy }} <span class="text-[11px] text-slate-400 font-bold">activities</span></p>
</div>
</div>
</div>
</div>
