<!-- Bottom Period Breakdown Section -->
<div class="card p-5">
<div class="mb-4">
<h3 class="text-[15px] font-semibold text-[var(--edify-primary)] tracking-tight">Plan Breakdown by Period</h3>
<p class="text-[12px] text-slate-400 font-bold mt-0.5">All activity types combined</p>
</div>

<div class="grid grid-cols-2 sm:grid-cols-4 gap-4">
<!-- This Week -->
<div class="flex items-center gap-3 bg-slate-50 border border-slate-100 rounded-surface p-3.5 hover:border-[var(--edify-primary)]/20 transition-all">
<div class="h-9 w-9 rounded-surface edify-primary-soft edify-primary-text flex items-center justify-center text-[18px]"><svg class="inline-block h-[1em] w-[1em] align-[-0.12em]" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.9" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="M8 7V3m8 4V3M4 11h16M5 5h14a1 1 0 011 1v13a1 1 0 01-1 1H5a1 1 0 01-1-1V6a1 1 0 011-1z"/></svg></div>
<div>
<p class="edify-text-caption font-semibold uppercase tracking-wider text-slate-400">This Week</p>
<p class="text-[18px] font-semibold text-slate-800 leading-tight mt-0.5">{{ breakdown.week }} <span class="edify-text-caption text-slate-400 font-bold">activities</span></p>
</div>
</div>

<!-- This Month -->
<div class="flex items-center gap-3 bg-slate-50 border border-slate-100 rounded-surface p-3.5 hover:border-[var(--edify-primary)]/20 transition-all">
<div class="h-9 w-9 rounded-surface bg-green-50 text-green-600 flex items-center justify-center text-[18px]"><svg class="inline-block h-[1em] w-[1em] align-[-0.12em]" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.9" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="M3 17l6-6 4 4 8-8m0 0h-5m5 0v5"/></svg></div>
<div>
<p class="edify-text-caption font-semibold uppercase tracking-wider text-slate-400">This Month</p>
<p class="text-[18px] font-semibold text-slate-800 leading-tight mt-0.5">{{ breakdown.month }} <span class="edify-text-caption text-slate-400 font-bold">activities</span></p>
</div>
</div>

<!-- This Quarter -->
<div class="flex items-center gap-3 bg-slate-50 border border-slate-100 rounded-surface p-3.5 hover:border-[var(--edify-primary)]/20 transition-all">
<div class="h-9 w-9 rounded-surface bg-purple-50 text-purple-600 flex items-center justify-center text-[18px]"><svg class="inline-block h-[1em] w-[1em] align-[-0.12em]" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.9" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="M7 14l3-3 3 3 4-5M8 21h8a2 2 0 002-2V5a2 2 0 00-2-2H8a2 2 0 00-2 2v14a2 2 0 002 2z"/></svg></div>
<div>
<p class="edify-text-caption font-semibold uppercase tracking-wider text-slate-400">This Quarter</p>
<p class="text-[18px] font-semibold text-slate-800 leading-tight mt-0.5">{{ breakdown.quarter }} <span class="edify-text-caption text-slate-400 font-bold">activities</span></p>
</div>
</div>

<!-- This FY -->
<div class="flex items-center gap-3 bg-slate-50 border border-slate-100 rounded-surface p-3.5 hover:border-[var(--edify-primary)]/20 transition-all">
<div class="h-9 w-9 rounded-surface bg-orange-50 text-orange-600 flex items-center justify-center text-[18px]"><svg class="inline-block h-[1em] w-[1em] align-[-0.12em]" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.9" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="M8 7V3m8 4V3M4 11h16M5 5h14a1 1 0 011 1v13a1 1 0 01-1 1H5a1 1 0 01-1-1V6a1 1 0 011-1z"/></svg></div>
<div>
<p class="edify-text-caption font-semibold uppercase tracking-wider text-slate-400">This FY</p>
<p class="text-[18px] font-semibold text-slate-800 leading-tight mt-0.5">{{ breakdown.fy }} <span class="edify-text-caption text-slate-400 font-bold">activities</span></p>
</div>
</div>
</div>
</div>
