<!-- Needs Setup -->
<div 
  hx-get="/schools?tab=staff_setup" 
  hx-target="#schools-table-container" 
  hx-push-url="true"
  class="bg-rose-50/50 rounded-2xl border border-rose-100 p-5 flex items-center justify-between shadow-sm relative overflow-hidden group hover:shadow-md cursor-pointer transition-all"
>
  <div class="space-y-1">
    <div class="flex items-center gap-2">
      <div class="h-7 w-7 rounded-lg bg-rose-100 text-rose-600 flex items-center justify-center shrink-0">
        <svg class="h-4.5 w-4.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
        </svg>
      </div>
      <span class="text-[12px] font-extrabold text-rose-700 uppercase tracking-wider">Needs Setup</span>
    </div>
    <h3 class="text-[26px] font-black text-slate-800 mt-1 leading-none">{{ needs_setup }} <span class="text-[14px] font-bold text-slate-500">Schools</span></h3>
    <p class="text-[11px] text-slate-400 font-semibold">Require staff or cluster assignment</p>
  </div>
  <!-- SVG Sparkline -->
  <div class="shrink-0">
    <svg class="h-10 w-28 text-rose-500" fill="none" viewBox="0 0 100 30" stroke="currentColor" stroke-width="2.5">
      <path d="M5 25 Q 25 5, 50 18 T 95 10" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </div>
  <!-- Accent top line indicator matching mockup -->
  <div class="absolute top-0 inset-x-0 h-1 bg-rose-500"></div>
</div>
