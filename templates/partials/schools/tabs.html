<!-- Roster Select Tabs -->
<div class="flex items-center gap-1 overflow-x-auto pb-1 sm:pb-0" role="tablist" aria-label="School directory views">
<!-- All Schools -->
<button
type="button"
id="schools-tab-all"
role="tab"
aria-controls="schools-table-container"
aria-selected="{% if active_tab == 'all' or not active_tab %}true{% else %}false{% endif %}"
tabindex="{% if active_tab == 'all' or not active_tab %}0{% else %}-1{% endif %}"
hx-get="/schools"
hx-target="#schools-table-container"
hx-include="#filters-form, #topbar-search-input"
hx-push-url="true"
hx-indicator="#schools-tab-loading"
@click="document.getElementById('filters-tab-input').value = 'all'; document.getElementById('filters-page-input').value = '1'"
class="h-9 px-4 flex items-center justify-center text-[12px] font-semibold transition-all border-b-2 whitespace-nowrap {% if active_tab == 'all' or not active_tab %}border-blue-600 text-blue-600{% else %}border-transparent text-slate-500 hover:text-slate-800 hover:border-slate-200{% endif %}"
>
All Schools <span class="ml-1.5 px-1.5 py-0.5 rounded-pill bg-blue-100 text-blue-700 edify-text-caption font-semibold">{{ all_count }}</span>
</button>

Unclustered <span class="ml-1.5 px-1.5 py-0.5 rounded-pill bg-slate-100 text-slate-600 edify-text-caption font-bold">{{ unclustered_count }}</span>
</button>
