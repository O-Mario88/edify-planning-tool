<div id="drawer-container" hx-swap-oob="innerHTML"></div>

<div hx-swap-oob="afterbegin:#toast-container">
<div
x-data="{ show: true }"
x-show="show"
x-init="setTimeout(() => show = false, 4000)"
x-transition
class="pointer-events-auto flex items-center justify-between gap-3 px-4 py-3 rounded-surface border shadow-lg max-w-sm text-[12px] font-semibold bg-emerald-50 text-emerald-700 border-emerald-200"
>
<span>{{ message }}</span>
<button @click="show = false" class="text-current opacity-70 hover:opacity-100">&times;</button>
</div>
</div>
