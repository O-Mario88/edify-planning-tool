{% load frontend_filters %}
<div class="edify-surface rounded-xl border border-slate-100 shadow-sm p-5 space-y-3 h-full"
     x-data="{
       chart: null,
       initChart() {
         if (this.chart) { this.chart.destroy(); }
         const el = document.querySelector('#plDashPerfChart');
         if (!el) return;
         this.chart = new ApexCharts(el, {
           series: [
             { name: 'Planned', type: 'column', data: {{ team_performance.planned|safe }} },
             { name: 'Completed', type: 'column', data: {{ team_performance.completed|safe }} },
             { name: 'Verified', type: 'column', data: {{ team_performance.verified|safe }} },
             { name: 'Target Achievement %', type: 'line', data: {{ team_performance.pct|safe }} }
           ],
           chart: { height: 300, type: 'line', toolbar: { show: false }, fontFamily: 'Outfit, sans-serif' },
           stroke: { width: [0, 0, 0, 2.5], curve: 'smooth' },
           colors: ['var(--edify-chart-teal)', 'var(--edify-chart-teal)', 'var(--edify-chart-teal)', 'var(--edify-chart-amber)'],
           plotOptions: { bar: { columnWidth: '62%', borderRadius: 2 } },
           dataLabels: { enabled: false },
           labels: {{ team_performance.labels|safe }},
           xaxis: { type: 'category', axisBorder: { show: false }, axisTicks: { show: false },
                    labels: { style: { colors: 'var(--edify-text-subtle)', fontSize: '12px', fontWeight: 600 } } },
           yaxis: [
             { seriesName: 'Planned', title: { text: 'Activities', style: { color: 'var(--edify-text-subtle)', fontSize: '12px' } }, labels: { style: { colors: 'var(--edify-text-subtle)', fontSize: '12px' } } },
             { seriesName: 'Planned', show: false }, { seriesName: 'Planned', show: false },
             { opposite: true, max: 100, min: 0, labels: { formatter: v => Math.round(v) + '%', style: { colors: 'var(--edify-text-subtle)', fontSize: '12px' } } }
           ],
           grid: { borderColor: 'var(--edify-chart-grid)', strokeDashArray: 4 },
           legend: { position: 'top', horizontalAlign: 'left', fontSize: '12px', fontWeight: 600, labels: { colors: 'var(--edify-text-muted)' }, markers: { radius: 12 } },
           tooltip: { theme: 'dark', shared: true, intersect: false }
         });
         this.chart.render();
       }
     }" x-init="$nextTick(() => initChart())">
  <div class="flex items-center justify-between">
    <h2 class="text-[13px] font-bold text-slate-800 tracking-tight flex items-center gap-2">
      <span class="text-slate-400">{% include "partials/analytics/pl/_icon.html" with name="chart" %}</span>Team Performance Overview
    </h2>
    <span class="edify-text-caption font-semibold text-slate-400">FY {{ fy }}</span>
  </div>
  <div class="h-[300px] w-full" id="plDashPerfChart"></div>
</div>
