{% load frontend_filters %}
<!-- Cluster Action Planner Card -->
<div 
  class="bg-white rounded-xl border border-slate-100 shadow-sm p-5 space-y-4 font-sans"
  @scroll-to-planner.window="$el.scrollIntoView({ behavior: 'smooth', block: 'center' })"
>
  <div class="flex items-center justify-between border-b border-slate-100 pb-2">
    <h3 class="text-[14px] font-extrabold text-slate-800">Cluster Action Planner</h3>
    <svg class="h-4 w-4 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.586a4 4 0 00-5.656-5.656l-6.415 6.585a6 6 0 108.486 8.486L20.5 13"/></svg>
  </div>

  <!-- Selected info -->
  <div class="flex justify-between items-start gap-4">
    <div>
      <span class="text-[10px] uppercase font-bold text-slate-400 block">Selected Cluster</span>
      <p class="text-[13px] font-extrabold text-slate-800 mt-0.5" x-text="selectedClusterName"></p>
    </div>
    <div class="text-right">
      <span class="text-[10px] uppercase font-bold text-slate-400 block">Recommended Focus</span>
      <div class="mt-0.5">
        <span class="px-2 py-0.5 rounded text-[9.5px] font-bold bg-rose-50 text-rose-600 border border-rose-100 uppercase" x-text="recommendedFocus"></span>
      </div>
    </div>
  </div>

  <!-- Inputs form -->
  <form id="action-planner-form" action="/clusters/schedule-activity" method="post" class="space-y-4">
    {% csrf_token %}
    <input type="hidden" name="cluster_id" :value="selectedClusterId">
    <input type="hidden" name="activity_type" :value="activityType">

    <!-- Activity type -->
    <div>
      <label class="text-[11px] font-bold text-slate-400 uppercase tracking-wider block mb-1.5">Activity Type</label>
      <div class="flex items-center gap-5">
        <label class="flex items-center gap-2 cursor-pointer text-[12.5px] font-semibold text-slate-700">
          <input type="radio" value="training" x-model="activityType" class="h-4 w-4 text-[#2563eb] border-slate-300 focus:ring-[#2563eb]">
          <span>Group Training</span>
        </label>
        <label class="flex items-center gap-2 cursor-pointer text-[12.5px] font-semibold text-slate-700">
          <input type="radio" value="meeting" x-model="activityType" class="h-4 w-4 text-[#2563eb] border-slate-300 focus:ring-[#2563eb]">
          <span>Cluster Meeting</span>
        </label>
      </div>
    </div>

    <!-- Expected participants -->
    <div>
      <label class="text-[11px] font-bold text-slate-400 uppercase tracking-wider block mb-1">Expected Participants</label>
      <div class="relative">
        <input 
          type="number" 
          name="expected_participants"
          x-model.number="participants" 
          class="h-9 w-full bg-slate-50 border border-slate-200 rounded-lg px-3 text-[12.5px] font-bold focus:bg-white focus:outline-none"
          required
        >
        <span class="absolute right-3 top-[26%] text-slate-400"><svg class="h-4.5 w-4.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"/></svg></span>
      </div>
    </div>

    <!-- Purpose -->
    <div>
      <label class="text-[11px] font-bold text-slate-400 uppercase tracking-wider block mb-1">Purpose for Meeting</label>
      <input 
        type="text" 
        name="purpose"
        x-model="purpose" 
        class="h-9 w-full bg-slate-50 border border-slate-200 rounded-lg px-3 text-[12px] font-semibold focus:bg-white focus:outline-none text-slate-700"
        placeholder="e.g. Support leadership strategies"
        required
      >
    </div>

    <!-- Focus Area intervention -->
    <div>
      <label class="text-[11px] font-bold text-slate-400 uppercase tracking-wider block mb-1">Primary Focus Intervention</label>
      <select 
        name="focus_intervention"
        x-model="focus" 
        class="h-9 w-full bg-slate-50 border border-slate-200 rounded-lg px-2 text-[12.5px] font-bold focus:bg-white focus:outline-none text-slate-700"
        required
      >
        <option value="leadership">Leadership</option>
        <option value="teaching_and_learning">Teaching & Learning</option>
        <option value="financial_health">Financial Health</option>
        <option value="exposure_to_the_word">Exposure to the Word of God</option>
        <option value="christlike_behaviour">Christlike Behaviour</option>
        <option value="gov_reqs">Government Requirements & Compliance</option>
        <option value="ed_tech">Education Technology</option>
        <option value="learning_environment">Learning Environment</option>
      </select>
    </div>

    <!-- Planned Date picker -->
    <div>
      <label class="text-[11px] font-bold text-slate-400 uppercase tracking-wider block mb-1">Planned Date</label>
      <input 
        type="date" 
        name="scheduled_date"
        class="h-9 w-full bg-slate-50 border border-slate-200 rounded-lg px-3 text-[12px] font-semibold focus:bg-white focus:outline-none text-slate-700"
        required
      >
    </div>

    <!-- Costs Preview section loaded dynamically -->
    <div 
      id="planner-cost-preview-container" 
      hx-get="/clusters/cost-preview" 
      hx-trigger="change delay:100ms, load"
      hx-include="#action-planner-form"
      class="border-t border-slate-100 pt-3.5"
    >
      <p class="text-center text-slate-400 text-[11px] font-semibold py-2">Loading cost preview...</p>
    </div>

    <button 
      type="submit" 
      class="w-full flex items-center justify-center gap-1.5 h-10 bg-[#002855] text-white text-[13px] font-extrabold rounded-lg hover:bg-opacity-95 shadow-md focus:outline-none transition-all mt-2"
    >
      <svg class="h-4.5 w-4.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
      Schedule Activity
    </button>
  </form>
</div>
