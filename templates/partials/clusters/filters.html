<form
id="filters-form"
hx-get="/clusters"
hx-trigger="change, refresh-clusters from:body"
hx-target="#clusters-table-container"
hx-push-url="true"
class="flex flex-wrap items-center gap-2.5 edify-text-caption font-bold text-slate-600 w-full"
>
<!-- Fiscal Year -->
<div class="flex items-center gap-1 edify-surface px-2.5 py-1.5 rounded-surface border border-slate-200 shadow-sm">
<span class="text-slate-400">FY</span>
<select name="fy" aria-label="Filter by fiscal year" class="bg-transparent focus:outline-none cursor-pointer text-slate-700">
<option value="2026" {% if selected_fy == '2026' %}selected{% endif %}>2026</option>
<option value="2025" {% if selected_fy == '2025' %}selected{% endif %}>2025</option>
</select>
</div>

<!-- Quarter -->
<div class="flex items-center gap-1 edify-surface px-2.5 py-1.5 rounded-surface border border-slate-200 shadow-sm">
<span class="text-slate-400">Quarter</span>
<select name="quarter" aria-label="Filter by quarter" class="bg-transparent focus:outline-none cursor-pointer text-slate-700">
<option value="">All</option>
<option value="Q1" {% if selected_quarter == 'Q1' %}selected{% endif %}>Q1</option>
<option value="Q2" {% if selected_quarter == 'Q2' %}selected{% endif %}>Q2</option>
<option value="Q3" {% if selected_quarter == 'Q3' %}selected{% endif %}>Q3</option>
<option value="Q4" {% if selected_quarter == 'Q4' %}selected{% endif %}>Q4</option>
</select>
</div>

<!-- District -->
<div class="flex items-center gap-1 edify-surface px-2.5 py-1.5 rounded-surface border border-slate-200 shadow-sm">
<span class="text-slate-400">District</span>
<select name="district" aria-label="Filter by district" class="bg-transparent focus:outline-none cursor-pointer text-slate-700">
<option value="">All</option>
{% for d in districts %}
<option value="{{ d.id }}" {% if selected_district == d.id %}selected{% endif %}>{{ d.name }}</option>
{% endfor %}
</select>
</div>

<!-- Sub-county -->
<div class="flex items-center gap-1 edify-surface px-2.5 py-1.5 rounded-surface border border-slate-200 shadow-sm">
<span class="text-slate-400">Sub-county</span>
<select name="sub_county" aria-label="Filter by sub-county" class="bg-transparent focus:outline-none cursor-pointer text-slate-700">
<option value="">All</option>
{% for sc in sub_counties %}
<option value="{{ sc.id }}" {% if selected_sub_county == sc.id %}selected{% endif %}>{{ sc.name }}</option>
{% endfor %}
</select>
</div>

<!-- Staff -->
<div class="flex items-center gap-1 edify-surface px-2.5 py-1.5 rounded-surface border border-slate-200 shadow-sm">
<span class="text-slate-400">Staff</span>
<select name="staff" aria-label="Filter by staff member" class="bg-transparent focus:outline-none cursor-pointer text-slate-700">
<option value="">All</option>
{% for p in staff_profiles %}
<option value="{{ p.id }}" {% if selected_staff == p.id %}selected{% endif %}>{{ p.user.name }}</option>
{% endfor %}
</select>
</div>

<!-- SSA Status -->
<div class="flex items-center gap-1 edify-surface px-2.5 py-1.5 rounded-surface border border-slate-200 shadow-sm">
<span class="text-slate-400">SSA</span>
<select name="ssa_status" aria-label="Filter by SSA status" class="bg-transparent focus:outline-none cursor-pointer text-slate-700">
<option value="">All</option>
<option value="done" {% if selected_ssa_status == 'done' %}selected{% endif %}>Complete</option>
<option value="not_done" {% if selected_ssa_status == 'not_done' %}selected{% endif %}>Incomplete</option>
</select>
</div>

<!-- Cluster Risk -->
<div class="flex items-center gap-1 edify-surface px-2.5 py-1.5 rounded-surface border border-slate-200 shadow-sm">
<span class="text-slate-400">Risk</span>
<select name="cluster_risk" aria-label="Filter by cluster risk" class="bg-transparent focus:outline-none cursor-pointer text-slate-700">
<option value="">All</option>
<option value="critical" {% if selected_cluster_risk == 'critical' %}selected{% endif %}>Critical</option>
<option value="needs_attention" {% if selected_cluster_risk == 'needs_attention' %}selected{% endif %}>Needs Attention</option>
<option value="healthy" {% if selected_cluster_risk == 'healthy' %}selected{% endif %}>Healthy</option>
</select>
</div>

<!-- Activity Status -->
<div class="flex items-center gap-1 edify-surface px-2.5 py-1.5 rounded-surface border border-slate-200 shadow-sm">
<span class="text-slate-400">Activity</span>
<select name="activity_status" aria-label="Filter by activity status" class="bg-transparent focus:outline-none cursor-pointer text-slate-700">
<option value="">All</option>
<option value="pending" {% if selected_activity_status == 'pending' %}selected{% endif %}>Pending</option>
<option value="completed" {% if selected_activity_status == 'completed' %}selected{% endif %}>Completed</option>
</select>
</div>

<button
type="button"
@click="$el.form.reset(); $el.form.querySelector('[name=q]').value = ''; $el.form.dispatchEvent(new Event('change', { bubbles: true }))"
class="ml-auto text-slate-400 hover:text-[var(--edify-chart-blue)] edify-text-caption font-semibold flex items-center gap-1 transition-colors"
>
<svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
Clear Filters
</button>
</form>
