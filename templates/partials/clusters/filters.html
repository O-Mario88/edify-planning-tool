{% comment %}
  Clusters filter bar — mirrors components/filter_bar.html's visual language
  (card p-3.5, mobile collapse) but keeps the search input + HTMX behaviour
  that already drives #clusters-table-container.
{% endcomment %}
<form
id="filters-form"
hx-get="/clusters"
hx-trigger="change, keyup delay:200ms changed from:input[name='q'], refresh-clusters from:body"
hx-target="#clusters-table-container"
hx-push-url="true"
x-data="{ open: false }"
class="card p-3.5"
>
<button type="button" class="lg:hidden flex items-center justify-between w-full text-[12px] font-semibold text-slate-600" @click="open = !open">
<span class="flex items-center gap-1.5">
<svg class="h-4 w-4 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 4a1 1 0 011-1h16a1 1 0 011 1v2.586a1 1 0 01-.293.707l-6.414 6.414a1 1 0 00-.293.707V17l-4 4v-6.586a1 1 0 00-.293-.707L3.293 7.293A1 1 0 013 6.586V4z"/></svg>
Filters
</span>
<svg class="h-4 w-4 text-slate-400 transition-transform" :class="open ? 'rotate-180' : ''" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M5.293 7.293a1 1 0 011.414 0L10 10.586l3.293-3.293a1 1 0 111.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414z" clip-rule="evenodd"/></svg>
</button>

<div class="grid grid-cols-1 sm:grid-cols-2 lg:flex lg:flex-wrap lg:items-end gap-3 mt-3 lg:mt-0" :class="open ? '' : 'hidden lg:flex'">
<!-- Search -->
<div class="space-y-1 lg:min-w-[160px]">
<label class="text-[11px] text-slate-400 font-semibold uppercase tracking-wider block">Search</label>
<div class="flex items-center gap-1.5 h-9 bg-slate-50 border border-slate-200 rounded-xl px-2.5">
<svg class="h-3.5 w-3.5 text-slate-400 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
<input type="text" name="q" value="{{ q }}" placeholder="Search clusters..." class="bg-transparent focus:outline-none w-full text-[12px] font-semibold placeholder-slate-400 text-slate-700">
</div>
</div>

{% for field in filter_fields %}
<div class="space-y-1 lg:min-w-[140px]">
<label class="text-[11px] text-slate-400 font-semibold uppercase tracking-wider block">{{ field.label }}</label>
<select name="{{ field.name }}"
        class="h-9 w-full bg-slate-50 border border-slate-200 rounded-xl px-2.5 text-[12px] font-semibold text-slate-700 cursor-pointer focus:outline-none focus:ring-1 focus:ring-[var(--edify-primary,#2e505f)]">
{% for opt in field.options %}
<option value="{{ opt.value }}" {% if opt.selected %}selected{% endif %}>{{ opt.label }}</option>
{% endfor %}
</select>
</div>
{% endfor %}

<a href="/clusters" class="text-[12px] font-semibold text-slate-500 hover:text-slate-700 flex items-center gap-1 h-9 lg:ml-auto">
<svg class="h-4 w-4 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
<span>Clear filters</span>
</a>
</div>
</form>
