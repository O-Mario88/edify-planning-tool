<!-- Risk Strip -->
<!-- Critical -->
<div 
  hx-get="/clusters?cluster_risk=critical" 
  hx-target="#clusters-table-container"
  hx-push-url="true"
  class="bg-white p-4 rounded-xl border border-slate-100 shadow-sm flex items-center justify-between hover:shadow-md transition-shadow relative overflow-hidden group cursor-pointer"
>
  <div class="absolute left-0 top-0 bottom-0 w-1 bg-rose-500"></div>
  <div class="flex items-center gap-3">
    <div class="h-10 w-10 rounded-full bg-rose-50 flex items-center justify-center shrink-0 text-rose-500">
      <svg class="h-5.5 w-5.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/></svg>
    </div>
    <div>
      <div class="flex items-center gap-1.5">
        <span class="text-[10px] uppercase font-bold text-rose-600 tracking-wider">Critical</span>
        <span class="text-[11px] font-bold text-slate-400">{{ risk_counts.critical }} clusters</span>
      </div>
      <p class="text-[10.5px] text-slate-500 font-semibold mt-0.5">Require immediate attention</p>
    </div>
  </div>
  <!-- Embedded Sparkline -->
  <div class="w-24 h-8 shrink-0">
    <svg class="w-full h-full" viewBox="0 0 100 30" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M5 25 L20 18 L35 22 L50 12 L65 15 L80 5 L95 10" stroke="#ef4444" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </div>
  <svg class="absolute right-3 top-[42%] h-4 w-4 text-rose-500 opacity-0 group-hover:opacity-100 transition-opacity" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/></svg>
</div>
