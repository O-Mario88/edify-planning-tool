{% if variant == "cards" %}
{% for r in records %}
<button type="button"
        @click="$dispatch('toggle-linked', { type: '{{ context_tab|escapejs }}', id: '{{ r.id|escapejs }}', label: '{{ r.title|escapejs }}', status: '{{ r.status|escapejs }}' })"
        :class="linked.find(i => i.id === '{{ r.id|escapejs }}') ? 'border-blue-400 ring-1 ring-blue-100 bg-blue-50/40' : 'border-slate-150 bg-white hover:border-blue-200'"
        class="flex items-center gap-2.5 p-3 rounded-xl border text-left transition-all w-full">
  <span :class="linked.find(i => i.id === '{{ r.id|escapejs }}') ? 'bg-blue-600 border-blue-600' : 'bg-white border-slate-300'"
        class="h-4 w-4 rounded border-2 flex items-center justify-center shrink-0 transition-colors">
    <svg x-show="linked.find(i => i.id === '{{ r.id|escapejs }}')" class="h-2.5 w-2.5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3.5"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>
  </span>
  <span class="min-w-0 flex-1">
    <span class="block text-[12px] font-bold text-slate-700 truncate">{{ r.title }}</span>
    <span class="block text-[10.5px] font-semibold text-slate-400 truncate">{{ r.meta }}</span>
  </span>
  {% if r.status %}
  <span class="shrink-0 inline-flex px-1.5 py-0.5 rounded-md text-[9.5px] font-bold uppercase tracking-wide
    {% if 'scheduled' in r.status|lower %}bg-emerald-50 text-emerald-700 border border-emerald-100
    {% elif 'progress' in r.status|lower %}bg-blue-50 text-blue-700 border border-blue-100
    {% else %}bg-slate-50 text-slate-500 border border-slate-150{% endif %}">{{ r.status }}</span>
  {% endif %}
</button>
{% empty %}
<p class="col-span-full text-[11.5px] text-slate-400 font-semibold text-center py-4">No records found for this context — try a different search or tab.</p>
{% endfor %}

{% else %}
{% for r in records %}
<button type="button"
        {% if target == "modal" %}@click="$dispatch('set-modal-record', { type: '{{ context_tab|escapejs }}', id: '{{ r.id|escapejs }}', label: '{{ r.title|escapejs }}' })"{% else %}@click="$dispatch('select-context', { type: '{{ context_tab|escapejs }}', id: '{{ r.id|escapejs }}', label: '{{ r.title|escapejs }}' })"{% endif %}
        class="w-full flex items-center gap-2.5 p-2.5 rounded-xl border border-slate-100 bg-white hover:border-blue-300 hover:bg-blue-50/40 text-left transition-all">
  <div class="h-7 w-7 rounded-lg bg-slate-50 border border-slate-100 flex items-center justify-center shrink-0">
    <svg class="h-3.5 w-3.5 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
  </div>
  <div class="min-w-0 flex-1">
    <p class="text-[12px] font-bold text-slate-700 truncate">{{ r.title }}</p>
    <p class="text-[10.5px] font-semibold text-slate-400 truncate">{{ r.meta }}</p>
  </div>
  {% if r.status %}
  <span class="shrink-0 inline-flex px-1.5 py-0.5 rounded-md text-[9.5px] font-bold uppercase tracking-wide bg-slate-50 text-slate-500 border border-slate-150">{{ r.status }}</span>
  {% endif %}
</button>
{% empty %}
<p class="text-[11.5px] text-slate-400 font-semibold text-center py-4">No records found for this context — try a different search or tab.</p>
{% endfor %}
{% endif %}
