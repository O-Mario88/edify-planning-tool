{% if variant == "cards" %}
{% for r in records %}
<button type="button"
        @click="$dispatch('toggle-linked', { type: '{{ context_tab|escapejs }}', id: '{{ r.id|escapejs }}', label: '{{ r.title|escapejs }}', status: '{{ r.status|escapejs }}' })"
        :class="linked.find(i => i.id === '{{ r.id|escapejs }}') ? 'edify-primary-border ring-1 edify-primary-ring edify-primary-soft-alpha-40' : 'border-slate-150 edify-surface edify-primary-border-hover'"
        class="flex items-center gap-2.5 p-3 rounded-surface border text-left transition-all w-full">
  <span :class="linked.find(i => i.id === '{{ r.id|escapejs }}') ? 'edify-primary-solid edify-primary-border' : 'edify-surface border-slate-300'"
        class="h-4 w-4 rounded-small border-2 flex items-center justify-center shrink-0 transition-colors">
    <svg x-show="linked.find(i => i.id === '{{ r.id|escapejs }}')" class="h-2.5 w-2.5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3.5"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>
  </span>
  <span class="min-w-0 flex-1">
    <span class="block text-[12px] font-bold text-slate-700 truncate">{{ r.title }}</span>
    <span class="block edify-text-caption font-semibold text-slate-400 truncate">{{ r.meta }}</span>
  </span>
  {% if r.status %}
  <span class="shrink-0 inline-flex px-1.5 py-0.5 rounded-pill edify-text-caption font-bold uppercase tracking-wide
    {% if 'scheduled' in r.status|lower %}bg-emerald-50 text-emerald-700 border border-emerald-100
    {% elif 'progress' in r.status|lower %}edify-primary-soft edify-primary-text border edify-primary-border
    {% else %}bg-slate-50 text-slate-500 border border-slate-150{% endif %}">{{ r.status }}</span>
  {% endif %}
</button>
{% empty %}
<p class="col-span-full edify-text-caption text-slate-400 font-semibold text-center py-4">No records found for this context — try a different search or tab.</p>
{% endfor %}

{% else %}
{% for r in records %}
<button type="button"
        {% if target == "modal" %}@click="$dispatch('set-modal-record', { type: '{{ context_tab|escapejs }}', id: '{{ r.id|escapejs }}', label: '{{ r.title|escapejs }}' })"{% else %}@click="$dispatch('select-context', { type: '{{ context_tab|escapejs }}', id: '{{ r.id|escapejs }}', label: '{{ r.title|escapejs }}' })"{% endif %}
        class="w-full flex items-center gap-2.5 p-2.5 rounded-control border border-slate-100 edify-surface edify-primary-border-hover edify-primary-soft-hover text-left transition-all">
  <div class="h-7 w-7 rounded-surface bg-slate-50 border border-slate-100 flex items-center justify-center shrink-0">
    <svg class="h-3.5 w-3.5 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
  </div>
  <div class="min-w-0 flex-1">
    <p class="text-[12px] font-bold text-slate-700 truncate">{{ r.title }}</p>
    <p class="edify-text-caption font-semibold text-slate-400 truncate">{{ r.meta }}</p>
  </div>
  {% if r.status %}
  <span class="shrink-0 inline-flex px-1.5 py-0.5 rounded-pill edify-text-caption font-bold uppercase tracking-wide bg-slate-50 text-slate-500 border border-slate-150">{{ r.status }}</span>
  {% endif %}
</button>
{% empty %}
<p class="edify-text-caption text-slate-400 font-semibold text-center py-4">No records found for this context — try a different search or tab.</p>
{% endfor %}
{% endif %}
