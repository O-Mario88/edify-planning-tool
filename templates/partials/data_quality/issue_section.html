{% if issues %}
<div class="edify-surface rounded-surface border border-slate-100 shadow-sm overflow-hidden">
<div class="px-5 py-4 border-b border-slate-100">
<h3 class="text-[14px] font-semibold text-slate-800">{{ title }}</h3>
</div>
<div class="overflow-x-auto">
<table class="w-full text-[12px] border-collapse text-left">
<thead>
<tr class="bg-slate-50 border-b border-slate-100">
<th class="px-4 py-3 edify-text-caption font-semibold uppercase text-slate-400 tracking-wider">School</th>
<th class="px-4 py-3 edify-text-caption font-semibold uppercase text-slate-400 tracking-wider">Suggested Fix</th>
<th class="px-4 py-3 edify-text-caption font-semibold uppercase text-slate-400 tracking-wider">Status</th>
<th class="px-4 py-3 text-right edify-text-caption font-semibold uppercase text-slate-400 tracking-wider">Actions</th>
</tr>
</thead>
<tbody class="divide-y divide-slate-100 font-medium">
{% for issue in issues %}
{% include "partials/data_quality/issue_row.html" %}
{% endfor %}
</tbody>
</table>
</div>
</div>
{% endif %}
