<!-- Filter row for Analytics Dashboard -->
<form 
id="analytics-filters-form"
hx-get="/analytics"
hx-trigger="change delay:100ms, keyup delay:200ms changed"
hx-target="#analytics-kpi-and-content-container"
hx-push-url="true"
class="flex flex-wrap items-center gap-2 bg-slate-50 p-3 rounded-xl  shadow-sm text-[11px] font-bold text-slate-500 font-sans"
>
<!-- FY selector -->
<div class="flex items-center gap-1 bg-white px-2.5 py-1.5 rounded-lg  hover:border-slate-300 transition-colors">
<span>FY</span>
<select name="fy" class="bg-transparent focus:outline-none cursor-pointer text-slate-700">
<option value="2025" {% if filters.selected_fy == '2025' %}selected{% endif %}>2025</option>
<option value="2026" {% if filters.selected_fy == '2026' %}selected{% endif %}>2026</option>
</select>
</div>

<!-- Quarter selector -->
<div class="flex items-center gap-1 bg-white px-2.5 py-1.5 rounded-lg  hover:border-slate-300 transition-colors">
<span>Quarter</span>
<select name="quarter" class="bg-transparent focus:outline-none cursor-pointer text-slate-700">
<option value="Q1" {% if filters.selected_quarter == 'Q1' %}selected{% endif %}>Q1 (Oct-Dec)</option>
<option value="Q2" {% if filters.selected_quarter == 'Q2' %}selected{% endif %}>Q2 (Jan-Mar)</option>
<option value="Q3" {% if filters.selected_quarter == 'Q3' %}selected{% endif %}>Q3 (Apr-Jun)</option>
<option value="Q4" {% if filters.selected_quarter == 'Q4' %}selected{% endif %}>Q4 (Jul-Sep)</option>
</select>
</div>

<!-- Region filter -->
<div class="flex items-center gap-1 bg-white px-2.5 py-1.5 rounded-lg  hover:border-slate-300 transition-colors">
<span>Region:</span>
<select name="region" class="bg-transparent focus:outline-none cursor-pointer text-slate-700 max-w-[100px] truncate">
<option value="">All</option>
{% for r in regions %}
<option value="{{ r.id }}" {% if filters.selected_region == r.id %}selected{% endif %}>{{ r.name }}</option>
{% endfor %}
</select>
</div>

<!-- District filter -->
<div class="flex items-center gap-1 bg-white px-2.5 py-1.5 rounded-lg  hover:border-slate-300 transition-colors">
<span>District:</span>
<select name="district" class="bg-transparent focus:outline-none cursor-pointer text-slate-700 max-w-[100px] truncate">
<option value="">All</option>
{% for d in districts %}
<option value="{{ d.id }}" {% if filters.selected_district == d.id %}selected{% endif %}>{{ d.name }}</option>
{% endfor %}
</select>
</div>

<!-- Cluster filter -->
<div class="flex items-center gap-1 bg-white px-2.5 py-1.5 rounded-lg  hover:border-slate-300 transition-colors">
<span>Cluster:</span>
<select name="cluster" class="bg-transparent focus:outline-none cursor-pointer text-slate-700 max-w-[100px] truncate">
<option value="">All</option>
{% for c in clusters %}
<option value="{{ c.id }}" {% if filters.selected_cluster == c.id %}selected{% endif %}>{{ c.name }}</option>
{% endfor %}
</select>
</div>

<!-- Staff filter -->
<div class="flex items-center gap-1 bg-white px-2.5 py-1.5 rounded-lg  hover:border-slate-300 transition-colors">
<span>Staff:</span>
<select name="staff" class="bg-transparent focus:outline-none cursor-pointer text-slate-700 max-w-[100px] truncate">
<option value="">All</option>
{% for s in staff_profiles %}
<option value="{{ s.id }}" {% if filters.selected_staff == s.id %}selected{% endif %}>{{ s.user.name }}</option>
{% endfor %}
</select>
</div>

<!-- Partner filter -->
<div class="flex items-center gap-1 bg-white px-2.5 py-1.5 rounded-lg  hover:border-slate-300 transition-colors">
<span>Partner:</span>
<select name="partner" class="bg-transparent focus:outline-none cursor-pointer text-slate-700 max-w-[100px] truncate">
<option value="">All</option>
{% for p in partners %}
<option value="{{ p.id }}" {% if filters.selected_partner == p.id %}selected{% endif %}>{{ p.name }}</option>
{% endfor %}
</select>
</div>

<!-- School Type filter -->
<div class="flex items-center gap-1 bg-white px-2.5 py-1.5 rounded-lg  hover:border-slate-300 transition-colors">
<span>School Type:</span>
<select name="school_type" class="bg-transparent focus:outline-none cursor-pointer text-slate-700">
<option value="All" {% if filters.selected_school_type == 'All' or not filters.selected_school_type %}selected{% endif %}>All</option>
<option value="core" {% if filters.selected_school_type == 'core' %}selected{% endif %}>Core</option>
<option value="champion" {% if filters.selected_school_type == 'champion' %}selected{% endif %}>Champion</option>
<option value="client" {% if filters.selected_school_type == 'client' %}selected{% endif %}>Client</option>
</select>
</div>

<!-- Activity Type filter -->
<div class="flex items-center gap-1 bg-white px-2.5 py-1.5 rounded-lg  hover:border-slate-300 transition-colors">
<span>Activity Type:</span>
<select name="activity_type" class="bg-transparent focus:outline-none cursor-pointer text-slate-700">
<option value="All" {% if filters.selected_activity_type == 'All' or not filters.selected_activity_type %}selected{% endif %}>All</option>
<option value="school_visit" {% if filters.selected_activity_type == 'school_visit' %}selected{% endif %}>School Visit</option>
<option value="cluster_training" {% if filters.selected_activity_type == 'cluster_training' %}selected{% endif %}>Cluster Training</option>
<option value="cluster_meeting" {% if filters.selected_activity_type == 'cluster_meeting' %}selected{% endif %}>Cluster Meeting</option>
<option value="ssa_activity" {% if filters.selected_activity_type == 'ssa_activity' %}selected{% endif %}>SSA Support</option>
</select>
</div>

<!-- Clear Filters -->
<a 
href="/analytics" 
hx-get="/analytics?fy=2026&quarter=Q2"
hx-target="#analytics-kpi-and-content-container"
hx-push-url="true"
class="ml-auto text-blue-600 hover:underline tracking-tight text-[11px]"
>
✕ Clear Filters
</a>
</form>
