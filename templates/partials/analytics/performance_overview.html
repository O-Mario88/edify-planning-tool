<div
x-data="{
chart: null,
initChart() {
if (this.chart) this.chart.destroy();
const options = {
  series: [
    { name: 'Planned', type: 'column', data: {{ performance_overview.planned|escape }} },
    { name: 'Achieved', type: 'column', data: {{ performance_overview.achieved|escape }} },
    { name: 'Achievement %', type: 'line', data: {{ performance_overview.pct|escape }} }
  ],
  chart: {
    height: 240,
    type: 'line',
    toolbar: { show: false },
    fontFamily: 'Inter, sans-serif',
    foreColor: 'var(--edify-text-muted)'
  },
  stroke: {
    width: [0, 0, 2.5],
    curve: 'smooth',
    lineCap: 'round',
    colors: ['transparent', 'transparent', 'var(--edify-chart-green)']
  },
  fill: {
    type: ['solid', 'gradient', 'solid'],
    gradient: {
      shade: 'light',
      type: 'vertical',
      shadeIntensity: 0.25,
      gradientToColors: ['var(--edify-chart-blue-soft)'],
      inverseColors: false,
      opacityFrom: 0.95,
      opacityTo: 0.7,
      stops: [0, 100]
    }
  },
  colors: ['var(--edify-chart-blue-soft)', 'var(--edify-chart-blue)', 'var(--edify-chart-green)'],
  plotOptions: {
    bar: {
      columnWidth: '42%',
      borderRadius: 8,
      borderRadiusApplication: 'end',
      colors: { backgroundBarRadius: 8 }
    }
  },
  markers: {
    size: [0, 0, 6],
    colors: ['var(--edify-surface)'],
    strokeColors: 'var(--edify-chart-green)',
    strokeWidth: 2.5,
    radius: 6,
    hover: { size: 8 }
  },
  dataLabels: {
    enabled: true,
    enabledOnSeries: [2],
    formatter: function (val) { return Math.round(val) + '%'; },
    style: { colors: ['var(--edify-chart-green)'], fontSize: '11px', fontWeight: 700 },
    background: { enabled: true, foreColor: 'var(--edify-chart-green)', borderRadius: 8, padding: 3, opacity: 1, borderWidth: 0, borderColor: 'var(--edify-surface)' }
  },
  labels: {{ performance_overview.labels|escape }},
  xaxis: {
    type: 'category',
    axisBorder: { show: false },
    axisTicks: { show: false },
    labels: {
      style: {
        colors: 'var(--edify-text-subtle)',
        fontSize: '12px',
        fontWeight: '500'
      }
    }
  },
  yaxis: [
    {
      title: { text: 'Activities', style: { color: 'var(--edify-text-muted)', fontSize: '12px', fontWeight: '500', fontFamily: 'Inter' } },
      labels: { style: { colors: 'var(--edify-text-subtle)', fontSize: '12px' } }
    },
    {
      opposite: true,
      title: { text: 'Achievement %', style: { color: 'var(--edify-chart-green)', fontSize: '12px', fontWeight: '600', fontFamily: 'Inter' } },
      max: 100,
      labels: { formatter: function (val) { return Math.round(val) + '%'; }, style: { colors: 'var(--edify-text-subtle)', fontSize: '12px' } }
    }
  ],
  grid: {
    borderColor: 'transparent',
    strokeDashArray: 4,
    xaxis: { lines: { show: false } },
    yaxis: { lines: { show: true } },
    padding: { left: 2, right: 6 }
  },
  legend: {
    position: 'top',
    horizontalAlign: 'right',
    fontSize: '12px',
    fontWeight: '500',
    labels: { colors: 'var(--edify-text-muted)' },
    markers: { size: 7, strokeWidth: 0, radius: 12 },
    itemMargin: { horizontal: 10, vertical: 0 }
  },
  tooltip: {
    theme: 'dark',
    shared: true,
    style: { fontSize: '12px', fontFamily: 'Inter' }
  }
};
this.chart = new ApexCharts(document.querySelector('#performanceChart'), options);
this.chart.render();
}
}"
x-init="initChart()"
class="edify-surface rounded-surface p-5 shadow-sm space-y-3"
>

<div class="flex items-start justify-between">
  <div>
    <h3 class="text-[14px] font-semibold text-slate-800 tracking-tight">Performance Overview</h3>
    <p class="edify-text-caption text-slate-400 font-normal mt-0.5">Planned vs Achieved activities across the fiscal year</p>
  </div>
  <select class="bg-slate-50 rounded-control edify-text-caption font-medium text-slate-500 py-1 px-2 outline-none cursor-pointer">
    <option>This FY</option>
  </select>
</div>

<div class="h-[240px] w-full" id="performanceChart"></div>
</div>
