<div
x-data="{
chart: null,
initChart() {
if (this.chart) this.chart.destroy();
const options = {
  series: [
    { name: 'Planned', type: 'column', data: {{ performance_overview.planned|safe }} },
    { name: 'Achieved', type: 'column', data: {{ performance_overview.achieved|safe }} },
    { name: 'Achievement %', type: 'line', data: {{ performance_overview.pct|safe }} }
  ],
  chart: {
    height: 200,
    type: 'line',
    toolbar: { show: false },
    fontFamily: 'Outfit, sans-serif'
  },
  stroke: {
    width: [0, 0, 2],
    curve: 'smooth'
  },
  colors: ['var(--edify-border)', 'var(--edify-chart-blue)', 'var(--edify-chart-green)'],
  plotOptions: {
    bar: {
      columnWidth: '45%',
      borderRadius: 3
    }
  },
  labels: {{ performance_overview.labels|safe }},
  xaxis: {
    type: 'category',
    axisBorder: { show: false },
    axisTicks: { show: false },
    labels: {
      style: {
        colors: 'var(--edify-text-subtle)',
        fontSize: '12px',
        fontWeight: '500'
      }
    }
  },
  yaxis: [
    {
      title: { text: 'Activities', style: { color: 'var(--edify-text-muted)', fontSize: '12px', fontWeight: '500', fontFamily: 'Outfit' } },
      labels: {
        style: { colors: 'var(--edify-text-subtle)', fontSize: '12px' }
      }
    },
    {
      opposite: true,
      title: { text: 'Achievement %', style: { color: 'var(--edify-text-muted)', fontSize: '12px', fontWeight: '500', fontFamily: 'Outfit' } },
      max: 100,
      labels: {
        formatter: function (val) { return val + '%'; },
        style: { colors: 'var(--edify-text-subtle)', fontSize: '12px' }
      }
    }
  ],
  grid: {
    borderColor: 'var(--edify-chart-grid)'
  },
  legend: {
    position: 'top',
    horizontalAlign: 'right',
    fontSize: '12px',
    fontWeight: '500',
    labels: { colors: 'var(--edify-text-muted)' },
    markers: { radius: 12 }
  },
  tooltip: {
    theme: 'dark'
  }
};
this.chart = new ApexCharts(document.querySelector('#performanceChart'), options);
this.chart.render();
}
}"
x-init="initChart()"
class="edify-surface rounded-xl p-5 shadow-sm space-y-3"
>

<div class="flex items-start justify-between">
  <div>
    <h3 class="text-[14px] font-semibold text-slate-800 tracking-tight">Performance Overview</h3>
    <p class="edify-text-caption text-slate-400 font-normal mt-0.5">Planned vs Achieved activities across the fiscal year</p>
  </div>
  <select class="bg-slate-50 rounded-md edify-text-caption font-medium text-slate-500 py-1 px-2 outline-none cursor-pointer">
    <option>This FY</option>
  </select>
</div>

<div class="h-[200px] w-full" id="performanceChart"></div>
</div>
