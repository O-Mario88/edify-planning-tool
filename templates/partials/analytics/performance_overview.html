<div
x-data="{
chart: null,
initChart() {
if (this.chart) this.chart.destroy();
const options = {
  series: [
    { name: 'Planned', type: 'column', data: {{ performance_overview.planned|safe }} },
    { name: 'Achieved', type: 'column', data: {{ performance_overview.achieved|safe }} },
    { name: 'Achievement %', type: 'line', data: {{ performance_overview.pct|safe }} }
  ],
  chart: {
    height: 200,
    type: 'line',
    toolbar: { show: false },
    fontFamily: 'Outfit, sans-serif'
  },
  stroke: {
    width: [0, 0, 2],
    curve: 'smooth'
  },
  colors: ['#e2e8f0', '#3b82f6', '#10b981'],
  plotOptions: {
    bar: {
      columnWidth: '45%',
      borderRadius: 3
    }
  },
  labels: {{ performance_overview.labels|safe }},
  xaxis: {
    type: 'category',
    axisBorder: { show: false },
    axisTicks: { show: false },
    labels: {
      style: {
        colors: '#94a3b8',
        fontSize: '10px',
        fontWeight: '500'
      }
    }
  },
  yaxis: [
    {
      title: { text: 'Activities', style: { color: '#64748b', fontSize: '10px', fontWeight: '500', fontFamily: 'Outfit' } },
      labels: {
        style: { colors: '#94a3b8', fontSize: '10px' }
      }
    },
    {
      opposite: true,
      title: { text: 'Achievement %', style: { color: '#64748b', fontSize: '10px', fontWeight: '500', fontFamily: 'Outfit' } },
      max: 100,
      labels: {
        formatter: function (val) { return val + '%'; },
        style: { colors: '#94a3b8', fontSize: '10px' }
      }
    }
  ],
  grid: {
    borderColor: '#94a3b833'
  },
  legend: {
    position: 'top',
    horizontalAlign: 'right',
    fontSize: '11px',
    fontWeight: '500',
    labels: { colors: '#64748b' },
    markers: { radius: 12 }
  },
  tooltip: {
    theme: 'dark'
  }
};
this.chart = new ApexCharts(document.querySelector('#performanceChart'), options);
this.chart.render();
}
}"
x-init="initChart()"
class="bg-white rounded-xl p-5 shadow-sm space-y-3"
>

<div class="flex items-start justify-between">
  <div>
    <h3 class="text-[14px] font-semibold text-slate-800 tracking-tight">Performance Overview</h3>
    <p class="text-[11px] text-slate-400 font-normal mt-0.5">Planned vs Achieved activities across the fiscal year</p>
  </div>
  <select class="bg-slate-50 rounded-md text-[11px] font-medium text-slate-500 py-1 px-2 outline-none cursor-pointer">
    <option>This FY</option>
  </select>
</div>

<div class="h-[200px] w-full" id="performanceChart"></div>
</div>
