<div
x-data="{
chart: null,
initChart() {
if (this.chart) this.chart.destroy();
const ctx = document.getElementById('performanceChart').getContext('2d');
this.chart = new Chart(ctx, {
data: {
labels: {{ performance_overview.labels|safe }},
datasets: [
{
type: 'bar', label: 'Planned',
data: {{ performance_overview.planned }},
backgroundColor: '#e2e8f0',
barThickness: 10, borderRadius: 3,
},
{
type: 'bar', label: 'Achieved',
data: {{ performance_overview.achieved }},
backgroundColor: '#3b82f6',
barThickness: 10, borderRadius: 3,
},
{
type: 'line', label: 'Achievement %',
data: {{ performance_overview.pct }},
borderColor: '#10b981', backgroundColor: '#10b981',
borderWidth: 2, pointRadius: 2.5, pointHoverRadius: 4,
fill: false, yAxisID: 'y1', tension: 0.35
}
]
},
options: {
responsive: true, maintainAspectRatio: false,
plugins: {
legend: {
position: 'top', align: 'end',
labels: { boxWidth: 8, boxHeight: 8, usePointStyle: true, pointStyle: 'circle',
  font: { family: 'Outfit', size: 11, weight: '500' }, color: '#64748b' }
},
tooltip: { mode: 'index', intersect: false,
  titleFont: { family: 'Outfit', size: 11, weight: '600' },
  bodyFont: { family: 'Outfit', size: 11 },
  backgroundColor: '#0f172a', padding: 10, cornerRadius: 6 }
},
scales: {
x: {
grid: { display: false },
labels: {{ performance_overview.labels|safe }},
ticks: { font: { family: 'Outfit', size: 10, weight: '500' }, color: '#94a3b8' }
},
y: {
beginAtZero: true,
ticks: { font: { family: 'Outfit', size: 10 }, color: '#94a3b8', maxTicksLimit: 5 },
grid: { color: '#f1f5f9' }
},
y1: {
type: 'linear', display: true, position: 'right', beginAtZero: true, max: 100,
ticks: { callback: function(v) { return v + '%'; }, font: { family: 'Outfit', size: 10 }, color: '#94a3b8', maxTicksLimit: 5 },
grid: { drawOnChartArea: false }
}
}
}
});
}
}"
x-init="initChart()"
class="bg-white rounded-xl p-5 shadow-sm space-y-3"
>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<div class="flex items-start justify-between">
  <div>
    <h3 class="text-[14px] font-semibold text-slate-800 tracking-tight">Performance Overview</h3>
    <p class="text-[11px] text-slate-400 font-normal mt-0.5">Planned vs Achieved activities across the fiscal year</p>
  </div>
  <select class="bg-slate-50 rounded-md text-[11px] font-medium text-slate-500 py-1 px-2 outline-none cursor-pointer">
    <option>This FY</option>
  </select>
</div>

<div class="h-[200px] relative w-full">
<canvas id="performanceChart"></canvas>
</div>
</div>
