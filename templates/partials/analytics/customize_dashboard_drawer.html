{% extends "components/drawers/base_drawer.html" %}

{% block drawer_title %}Customize Dashboard{% endblock %}
{% block drawer_subtitle %}Toggle card visibility and choose layout preferences{% endblock %}

{% block drawer_body %}
<form
@submit.prevent="alert('Dashboard customization preferences saved!'); $dispatch('close-drawer');"
class="space-y-4 text-[12px] "
>
<div class="space-y-2">
<label class="block font-bold text-slate-700">KPI Cards Visibility</label>
<div class="space-y-1.5">
<label class="flex items-center justify-between font-semibold text-slate-700 cursor-pointer">
<span>Overall Target Achievement</span>
<input type="checkbox" checked class="accent-[var(--edify-primary)]">
</label>
<label class="flex items-center justify-between font-semibold text-slate-700 cursor-pointer">
<span>Teachers & Leaders Trained</span>
<input type="checkbox" checked class="accent-[var(--edify-primary)]">
</label>
<label class="flex items-center justify-between font-semibold text-slate-700 cursor-pointer">
<span>Students & Schools Impacted</span>
<input type="checkbox" checked class="accent-[var(--edify-primary)]">
</label>
<label class="flex items-center justify-between font-semibold text-slate-700 cursor-pointer">
<span>SSA Average Performance</span>
<input type="checkbox" checked class="accent-[var(--edify-primary)]">
</label>
</div>
</div>

<div class="space-y-2 mt-4">
<label class="block font-bold text-slate-700">Display Layout Preference</label>
<div class="space-y-1.5">
<label class="inline-flex items-center gap-1.5 font-semibold text-slate-700 cursor-pointer">
<input type="radio" name="layout" value="grid" checked class="accent-[var(--edify-primary)]">
<span>Standard Grid Layout (Mockup reference)</span>
</label>
<label class="inline-flex items-center gap-1.5 font-semibold text-slate-700 cursor-pointer">
<input type="radio" name="layout" value="compact" class="accent-[var(--edify-primary)]">
<span>Compact Tabular View</span>
</label>
</div>
</div>

<!-- Action buttons -->
<div class="drawer-footer">
<button
type="button"
@click="$dispatch('close-drawer')"
class="px-5 h-9 rounded-xl btn-premium-secondary font-bold text-[12px]"
>
Cancel
</button>
<button
type="submit"
class="px-6 h-9 rounded-xl btn-premium-primary font-bold text-[12px] shadow-sm flex items-center justify-center"
>
Save Preferences
</button>
</div>
</form>
{% endblock %}
