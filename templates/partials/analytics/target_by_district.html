<div class="edify-surface rounded-surface  p-4 shadow-sm space-y-4">
<div class="flex items-center justify-between border-b border-slate-50 pb-2">
<div>
<h3 class="text-[14px] font-semibold text-slate-800 tracking-tight flex items-center gap-1.5">
<span>Target Achievement by District</span>
<span class="edify-text-caption text-slate-400 cursor-help" title="Percentage of assigned targets achieved by schools in each district">ℹ️</span>
</h3>
<p class="edify-text-caption text-slate-400 font-semibold mt-0.5">District targets achievement progress</p>
</div>

<select class="bg-slate-50  rounded-control edify-text-caption font-semibold text-slate-500 py-1 px-2.5 outline-none cursor-pointer">
<option>This Quarter</option>
</select>
</div>

<div class="space-y-3 max-h-[300px] overflow-y-auto pr-1">
{% if target_by_district %}
{% for dist in target_by_district %}
<div class="space-y-1">
<div class="flex items-center justify-between edify-text-caption font-bold text-slate-600">
<span class="truncate">{{ dist.name }}</span>
<div class="flex items-center gap-2">
<span class="edify-text-caption text-slate-400 font-semibold">({{ dist.achieved }}/{{ dist.planned }})</span>
<span class="font-semibold text-slate-800">{{ dist.pct }}%</span>
</div>
</div>
<div class="h-1.5 w-full bg-slate-50  rounded-pill overflow-hidden">
<div class="h-full rounded-pill {{ dist.bar_color }}" style="width: {{ dist.pct }}%"></div>
</div>
</div>
{% endfor %}
{% else %}
<p class="edify-text-caption text-slate-500 font-bold text-center py-6">No targets or activities in this period.</p>
{% endif %}
</div>
</div>
