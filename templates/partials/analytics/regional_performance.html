<div class="edify-surface rounded-surface  p-4 shadow-sm space-y-4">
<div class="flex items-center justify-between border-b border-slate-50 pb-2">
<div>
<h3 class="text-[14px] font-semibold text-slate-800 tracking-tight flex items-center gap-1.5">
<span>Regional Performance</span>
<span class="edify-text-caption text-slate-400 cursor-help" title="Average scores and activity totals across regional zones">ℹ️</span>
</h3>
<p class="edify-text-caption text-slate-400 font-semibold mt-0.5">Regional activity and SSA coverage</p>
</div>

<select class="bg-slate-50  rounded-control edify-text-caption font-semibold text-slate-500 py-1 px-2.5 outline-none cursor-pointer">
<option>This Quarter</option>
</select>
</div>

<div class="grid grid-cols-1 md:grid-cols-2 gap-4 items-center">
<!-- Left side: Uganda simplified regional SVG map -->
<div class="flex items-center justify-center">
<svg class="h-36 w-36 overflow-visible" viewBox="0 0 100 100">
<!-- Northern Region (Light Blue) -->
<path d="M 10 30 Q 30 10 50 20 Q 70 10 90 25 Q 85 45 65 50 Q 40 50 10 30 Z" fill="var(--edify-chart-blue-soft)" stroke="var(--edify-surface-raised)" stroke-width="2" class="hover:opacity-85 transition-opacity cursor-pointer">
<title>Northern Region</title>
</path>
<!-- Western Region (Purple-blue) -->
<path d="M 10 30 Q 40 50 35 65 Q 25 80 15 90 Q 5 60 10 30 Z" fill="var(--edify-chart-purple)" stroke="var(--edify-surface-raised)" stroke-width="2" class="hover:opacity-85 transition-opacity cursor-pointer">
<title>Western Region</title>
</path>
<!-- Eastern Region (Teal-green) -->
<path d="M 90 25 Q 85 45 65 50 Q 75 70 85 85 Q 95 55 90 25 Z" fill="var(--edify-chart-teal)" stroke="var(--edify-surface-raised)" stroke-width="2" class="hover:opacity-85 transition-opacity cursor-pointer">
<title>Eastern Region</title>
</path>
<!-- Central Region (Blue-gray) -->
<path d="M 35 65 Q 65 50 75 70 Q 55 90 35 90 Q 25 80 35 65 Z" fill="var(--edify-chart-blue)" stroke="var(--edify-surface-raised)" stroke-width="2" class="hover:opacity-85 transition-opacity cursor-pointer">
<title>Central Region</title>
</path>
</svg>
</div>

<!-- Right side: Region statistics details list -->
<div class="space-y-3">
{% for reg in regional_performance %}
<div class="flex items-center justify-between edify-text-caption font-bold text-slate-600 border-b border-slate-50 pb-1">
<div class="flex items-center gap-1.5">
<span class="h-2 w-2 rounded-pill {% if reg.name == 'Northern' %}bg-blue-300{% elif reg.name == 'Western' %}bg-purple-400{% elif reg.name == 'Eastern' %}bg-teal-400{% else %}bg-indigo-400{% endif %}"></span>
<span>{{ reg.name }}</span>
</div>
<div class="flex items-center gap-2">
<span class="text-slate-400 font-semibold">({{ reg.completed }} acts)</span>
<span class="font-semibold text-slate-800">{{ reg.ssa_avg }} Avg</span>
</div>
</div>
{% endfor %}
</div>
</div>
</div>
