{% load frontend_filters %}
<div class="edify-surface rounded-surface border border-slate-100 shadow-sm p-5 space-y-3 h-full"
     x-data="{
       chart: null,
       initChart() {
         if (this.chart) { this.chart.destroy(); }
         const el = document.querySelector('#plStaffPartnerChart');
         if (!el) return;
         this.chart = new ApexCharts(el, {
           series: [
             { name: 'Team Staff', data: {{ staff_partner.staff|escape }} },
             { name: 'Partners', data: {{ staff_partner.partner|escape }} }
           ],
           chart: { height: 240, type: 'bar', toolbar: { show: false }, fontFamily: 'Inter, sans-serif' },
           colors: ['var(--edify-chart-blue)', 'var(--edify-chart-blue-soft)'],
           plotOptions: { bar: { columnWidth: '58%', borderRadius: 8, borderRadiusApplication: 'end', dataLabels: { position: 'top' } } },
           dataLabels: { enabled: true, offsetY: -16, style: { fontSize: '12px', colors: ['var(--edify-text-muted)'], fontWeight: 700 } },
           labels: {{ staff_partner.labels|escape }},
           xaxis: { type: 'category', axisBorder: { show: false }, axisTicks: { show: false },
                    labels: { style: { colors: 'var(--edify-text-subtle)', fontSize: '12px', fontWeight: 600 } } },
           yaxis: { labels: { style: { colors: 'var(--edify-text-subtle)', fontSize: '12px' } } },
           grid: { borderColor: 'var(--edify-chart-grid)', strokeDashArray: 4 },
           legend: { position: 'top', horizontalAlign: 'right', fontSize: '12px', fontWeight: 600, labels: { colors: 'var(--edify-text-muted)' }, markers: { radius: 12 } },
           tooltip: { theme: 'dark', shared: true, intersect: false }
         });
         this.chart.render();
       }
     }" x-init="$nextTick(() => initChart())">
  <h3 class="text-[13px] font-bold text-slate-800 tracking-tight">I. Staff &amp; Partner Performance</h3>
  <p class="edify-text-caption text-slate-400 font-medium -mt-1">Completed activities: team staff vs partners</p>
  <div class="h-[240px] w-full" id="plStaffPartnerChart"></div>
</div>
