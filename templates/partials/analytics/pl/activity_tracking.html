{% load frontend_filters %}
<div class="edify-surface rounded-surface border border-slate-100 shadow-sm p-5 space-y-3 h-full">
  <h3 class="text-[13px] font-bold text-slate-800 tracking-tight">H. Activity Tracking</h3>
  <div class="grid grid-cols-2 sm:grid-cols-3 gap-3 pt-1">
    {% for c in activity_tracking.cards %}
    <div class="rounded-surface border border-slate-100 p-3">
      <p class="edify-kpi-label edify-text-caption text-slate-400 leading-tight truncate" title="{{ c.label }}">{{ c.label }}</p>
      <div class="flex items-baseline gap-1 mt-1.5">
        <span class="text-[16px] font-bold text-slate-800 tabular-nums leading-none">{{ c.done }}</span>
        <span class="edify-text-caption font-semibold text-slate-400">/ {{ c.planned }}</span>
      </div>
      <div class="flex items-center justify-between mt-2 mb-1">
        <span class="edify-text-caption font-bold text-slate-500 tabular-nums">{{ c.pct }}%</span>
      </div>
      <div class="h-1.5 w-full bg-slate-50 rounded-pill overflow-hidden">
        <div class="h-full rounded-pill {{ c.bar_color }}" style="width: {{ c.pct }}%"></div>
      </div>
    </div>
    {% endfor %}
  </div>
  <p class="edify-text-caption text-slate-400 font-medium pt-0.5">Completed / planned across the team's valid workflow states.</p>
</div>
