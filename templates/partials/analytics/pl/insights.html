{% load frontend_filters %}
<div class="edify-surface rounded-surface border border-slate-100 shadow-sm p-5 space-y-3 h-full flex flex-col">
  <h3 class="text-[13px] font-bold text-slate-800 tracking-tight">G. Recent Insights / Recommended Actions</h3>
  <div class="space-y-2 flex-1">
    {% for i in insights.items %}
    <div class="flex items-start gap-2.5 rounded-surface border border-slate-100 p-2.5 hover:bg-slate-50/60 transition-colors">
      <span class="mt-0.5 h-5 w-5 rounded-pill flex items-center justify-center shrink-0
        {% if i.severity == 'danger' %}bg-rose-50 text-rose-600{% else %}bg-amber-50 text-amber-600{% endif %}">
        <svg class="h-3 w-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v4m0 4h.01M10.3 3.9L1.8 18a2 2 0 001.7 3h17a2 2 0 001.7-3L14.7 3.9a2 2 0 00-3.4 0z"/></svg>
      </span>
      <div class="flex-1 min-w-0">
        <p class="edify-text-caption font-semibold text-slate-700 leading-snug">{{ i.text }}</p>
        <p class="edify-text-caption font-semibold text-blue-600 mt-0.5">{{ i.action }}</p>
      </div>
      <button type="button" hx-get="/analytics/program-lead/drilldown{{ i.link }}&fy={{ fy }}{% if quarter %}&quarter={{ quarter }}{% endif %}"
         hx-target="#drawer-container" hx-swap="innerHTML"
         class="edify-text-caption font-bold text-slate-400 hover:text-blue-600 shrink-0 pt-0.5">View</button>
    </div>
    {% empty %}
    <div class="flex flex-col items-center justify-center py-8 text-center">
      <span class="h-8 w-8 rounded-pill bg-emerald-50 text-emerald-600 flex items-center justify-center mb-2">
        <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4"/></svg>
      </span>
      <p class="text-[12px] font-semibold text-slate-500">No urgent risks detected.</p>
      <p class="edify-text-caption text-slate-400 mt-0.5">Your team is on track this period.</p>
    </div>
    {% endfor %}
  </div>
  <div class="pt-2 border-t border-slate-50">
    <p class="edify-text-caption font-bold uppercase tracking-wider text-slate-400 mb-1.5">Recommended Next Action</p>
    <button type="button" hx-get="/analytics/program-lead/drilldown{{ insights.cta_link }}&fy={{ fy }}{% if quarter %}&quarter={{ quarter }}{% endif %}"
       hx-target="#drawer-container" hx-swap="innerHTML"
       class="w-full inline-flex items-center justify-center gap-2 h-9 rounded-control bg-blue-600 hover:bg-blue-700 text-white text-[12px] font-bold transition-colors">
      {{ insights.cta }}
      <svg class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M13 7l5 5-5 5M6 12h12"/></svg>
    </button>
  </div>
</div>
