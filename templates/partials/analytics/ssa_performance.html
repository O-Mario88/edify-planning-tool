<div class="edify-surface rounded-surface  p-4 shadow-sm space-y-4">
<div class="flex items-center justify-between border-b border-slate-50 pb-2">
<div>
<h3 class="text-[14px] font-semibold text-slate-800 tracking-tight flex items-center gap-1.5">
<span>SSA Performance by Intervention</span>
<span class="inline-flex h-4 w-4 items-center justify-center text-slate-400 cursor-help" title="Average SSA score out of 10.0 across all 8 interventions" aria-label="SSA score scale information">
  <svg viewBox="0 0 24 24" class="h-3.5 w-3.5" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
    <circle cx="12" cy="12" r="9"></circle>
    <path d="M12 10.8v5.2M12 7.5h.01"></path>
  </svg>
</span>
</h3>
<p class="edify-text-caption text-slate-400 font-semibold mt-0.5">Average SSA score (out of 10.0)</p>
</div>

<select class="bg-slate-50  rounded-control edify-text-caption font-semibold text-slate-500 py-1 px-2.5 outline-none cursor-pointer">
<option>This Quarter</option>
</select>
</div>

<div class="space-y-2">
{% for item in ssa_performance %}
<div class="space-y-1">
<div class="flex items-center justify-between edify-text-caption font-bold text-slate-600">
<span>{{ item.label }}</span>
<span class="font-semibold text-slate-800">{{ item.value }}/10.0</span>
</div>
<div class="h-2 w-full bg-slate-50  rounded-pill overflow-hidden">
<div
class="h-full rounded-pill {% if item.code == 'leadership' %}bg-emerald-500{% elif item.code == 'teaching_learning' %}bg-indigo-500{% elif item.code == 'community_engagement' %}bg-blue-500{% elif item.code == 'school_management' %}bg-orange-500{% elif item.code == 'financial_health' %}bg-yellow-500{% elif item.code == 'infrastructure_wash' %}bg-teal-500{% elif item.code == 'safety_wellbeing' %}bg-rose-500{% else %}bg-slate-400{% endif %}"
style="width: {{ item.pct }}%"
></div>
</div>
</div>
{% endfor %}
</div>
</div>
