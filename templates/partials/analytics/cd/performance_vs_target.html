{% load frontend_filters %}
<div class="edify-surface rounded-surface border border-slate-100 shadow-sm p-5 space-y-3"
     x-data="{
       chart: null,
       initChart() {
         if (this.chart) { this.chart.destroy(); }
         const el = document.querySelector('#cdPerformanceChart');
         if (!el) return;
         const self = this;
         this.chart = new ApexCharts(el, {
           series: [
             { name: 'Planned Activities', type: 'column', data: {{ performance_vs_target.planned|escape }} },
             { name: 'Completed Activities', type: 'column', data: {{ performance_vs_target.completed|escape }} },
             { name: 'Target Achievement %', type: 'line', data: {{ performance_vs_target.pct|escape }} }
           ],
           chart: { height: 268, type: 'line', toolbar: { show: false }, fontFamily: 'Inter, sans-serif',
                    events: { dataPointSelection: (e, ctx, cfg) => {
                      const m = cfg.dataPointIndex + 1;
                      window.htmx && window.htmx.ajax('GET',
                        '/analytics/country-director/drilldown?drill=kpi&month=' + m + '&fy={{ fy }}',
                        { target: '#drawer-container', swap: 'innerHTML' });
                    } } },
           stroke: { width: [0, 0, 2.5], curve: 'smooth' },
           colors: ['var(--edify-info-border)', 'var(--edify-chart-blue)', 'var(--edify-chart-blue)'],
           plotOptions: { bar: { columnWidth: '55%', borderRadius: 8, borderRadiusApplication: 'end' } },
           dataLabels: { enabled: false },
           labels: {{ performance_vs_target.labels|escape }},
           xaxis: { type: 'category', axisBorder: { show: false }, axisTicks: { show: false },
                    labels: { style: { colors: 'var(--edify-text-subtle)', fontSize: '12px', fontWeight: '600' } } },
           yaxis: [
             { seriesName: 'Planned Activities', title: { text: 'Activities', style: { color: 'var(--edify-text-subtle)', fontSize: '12px' } },
               labels: { style: { colors: 'var(--edify-text-subtle)', fontSize: '12px' } } },
             { seriesName: 'Completed Activities', show: false },
             { opposite: true, max: 100, min: 0,
               labels: { formatter: v => Math.round(v) + '%', style: { colors: 'var(--edify-text-subtle)', fontSize: '12px' } } }
           ],
           grid: { borderColor: 'var(--edify-chart-grid)', strokeDashArray: 4 },
           legend: { position: 'top', horizontalAlign: 'left', fontSize: '12px', fontWeight: 600, labels: { colors: 'var(--edify-text-muted)' }, markers: { radius: 12 } },
           tooltip: { theme: 'dark', shared: true, intersect: false }
         });
         this.chart.render();
       }
     }" x-init="$nextTick(() => initChart())">
  <div class="flex items-center justify-between">
    <div>
      <h3 class="text-[13px] font-bold text-slate-800 tracking-tight">1. Performance vs Target Over Time</h3>
      <p class="edify-text-caption text-slate-400 font-medium mt-0.5">Are teams completing what they planned? · Click a month for the execution breakdown · FY {{ fy }}</p>
    </div>
  </div>
  {% if not performance_vs_target.has_target %}
  <p class="edify-text-caption text-amber-600 font-semibold bg-amber-50 border border-amber-100 rounded-surface px-2.5 py-1 inline-block">
    Achievement line shows 0 — no annual country targets set yet.
  </p>
  {% endif %}
  <div class="h-[268px] w-full" id="cdPerformanceChart"></div>
</div>
