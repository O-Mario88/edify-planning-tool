<!-- Filters Form for Consolidated Fund Allocation -->
<form 
id="filters-form"
hx-get="/finance/fund-allocation"
hx-trigger="change delay:100ms, keyup delay:200ms changed from:input[name='q']"
hx-target="#allocation-table-container"
hx-push-url="true"
class="flex flex-wrap items-center gap-2.5 text-[12px] font-bold"
>
<!-- Month Dropdown -->
<div class="flex items-center gap-1 bg-white px-2.5 py-1.5 rounded-lg border border-slate-200 shadow-sm hover:border-slate-300 transition-colors">
<span class="text-[14px] text-slate-400">📅</span>
<select name="month" class="bg-transparent focus:outline-none cursor-pointer text-slate-700">
<option value="October" {% if selected_month == 'October' %}selected{% endif %}>October</option>
<option value="November" {% if selected_month == 'November' %}selected{% endif %}>November</option>
<option value="December" {% if selected_month == 'December' %}selected{% endif %}>December</option>
<option value="January" {% if selected_month == 'January' %}selected{% endif %}>January</option>
<option value="February" {% if selected_month == 'February' %}selected{% endif %}>February</option>
<option value="March" {% if selected_month == 'March' %}selected{% endif %}>March</option>
<option value="April" {% if selected_month == 'April' %}selected{% endif %}>April 2026</option>
<option value="May" {% if selected_month == 'May' %}selected{% endif %}>May</option>
<option value="June" {% if selected_month == 'June' %}selected{% endif %}>June</option>
<option value="July" {% if selected_month == 'July' %}selected{% endif %}>July</option>
<option value="August" {% if selected_month == 'August' %}selected{% endif %}>August</option>
<option value="September" {% if selected_month == 'September' %}selected{% endif %}>September</option>
</select>
</div>

<!-- Region / Team Dropdown -->
<div class="flex items-center gap-1 bg-white px-2.5 py-1.5 rounded-lg border border-slate-200 shadow-sm hover:border-slate-300 transition-colors">
<span class="text-[14px] text-slate-400">👥</span>
<select name="region" class="bg-transparent focus:outline-none cursor-pointer text-slate-700">
<option value="">All Regions / Teams</option>
{% for r in regions %}
<option value="{{ r.id }}" {% if selected_region == r.id %}selected{% endif %}>{{ r.name }}</option>
{% endfor %}
</select>
</div>

<!-- Search Box -->
<div class="flex items-center gap-1.5 bg-white px-2.5 py-1.5 rounded-lg border border-slate-200 shadow-sm hover:border-slate-300 transition-colors">
<span class="text-[14px] text-slate-400">🔎</span>
<input 
type="text" 
name="q" 
placeholder="Search staff, owner, school, cluster..." 
value="{{ search_q }}"
class="bg-transparent focus:outline-none w-48 placeholder-slate-400 font-bold text-slate-700"
>
</div>

<!-- Export button opening Export Drawer -->
<button 
type="button"
hx-get="/finance/fund-allocation/export-drawer?month={{ selected_month }}&fy={{ selected_fy }}"
hx-target="#drawer-container"
hx-swap="innerHTML"
class="flex items-center gap-1.5 h-8 px-4 btn-premium-primary text-white border border-[#2e505f] rounded-lg hover:bg-[#001f40] hover:border-[#001f40] focus:outline-none transition-all shadow-sm font-semibold"
>
<svg class="h-3.5 w-3.5 text-white/90" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
<path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/>
</svg>
Export
</button>
</form>
