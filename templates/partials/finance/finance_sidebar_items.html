<!-- Category: FINANCE WORK -->
<div class="px-3 pt-5 pb-1 text-[10px] font-bold uppercase tracking-widest text-[#a5c3c7]/60" :class="collapsed ? 'hidden' : 'block'">
  Finance Work
</div>

<!-- Dashboard -->
<a 
  href="/dashboard" 
  class="group flex items-center gap-3 px-3 py-2 text-[12.5px] font-bold rounded-xl transition-all text-[#a5c3c7] hover:text-white hover:bg-[#104a50]"
>
  <div class="h-8 w-8 rounded-lg flex items-center justify-center shrink-0">
    <svg class="h-4.5 w-4.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
      <path stroke-linecap="round" stroke-linejoin="round" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z" />
    </svg>
  </div>
  <span x-show="!collapsed" class="whitespace-nowrap">Dashboard</span>
</a>

<!-- Planning -->
<a 
  href="/planning" 
  class="group flex items-center gap-3 px-3 py-2 text-[12.5px] font-bold rounded-xl transition-all text-[#a5c3c7] hover:text-white hover:bg-[#104a50]"
>
  <div class="h-8 w-8 rounded-lg flex items-center justify-center shrink-0">
    <svg class="h-4.5 w-4.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
      <path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4" />
    </svg>
  </div>
  <span x-show="!collapsed" class="whitespace-nowrap">Planning</span>
</a>

<!-- Finance Submenu (Open by default) -->
<div x-data="{ financeOpen: true }">
  <button 
    @click="financeOpen = !financeOpen"
    class="w-full group flex items-center justify-between px-3 py-2 text-[12.5px] font-bold rounded-xl transition-all text-[#a5c3c7] hover:text-white hover:bg-[#104a50]"
  >
    <div class="flex items-center gap-3">
      <div class="h-8 w-8 rounded-lg flex items-center justify-center shrink-0">
        <svg class="h-4.5 w-4.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
        </svg>
      </div>
      <span x-show="!collapsed" class="whitespace-nowrap">Finance</span>
    </div>
    <svg 
      x-show="!collapsed"
      class="h-4 w-4 transform transition-transform duration-200" 
      :class="financeOpen ? 'rotate-180' : ''" 
      fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"
    >
      <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7" />
    </svg>
  </button>
  
  <div 
    x-show="financeOpen && !collapsed" 
    x-transition:enter="transition ease-out duration-100"
    x-transition:enter-start="transform opacity-0 scale-95"
    x-transition:enter-end="transform opacity-100 scale-100"
    class="pl-11 pr-2 py-1 space-y-1"
  >
    <!-- Fund Allocation -->
    <a 
      href="/finance/fund-allocation" 
      class="block px-3 py-1.5 text-[12px] font-bold rounded-lg transition-all {% if request.path == '/finance/fund-allocation' %}bg-[#104a50] text-white{% else %}text-[#a5c3c7] hover:text-white{% endif %}"
    >
      Fund Allocation
    </a>
    
    <!-- Budgets -->
    <a 
      href="/budgets/monthly" 
      class="block px-3 py-1.5 text-[12px] font-bold rounded-lg transition-all text-[#a5c3c7] hover:text-white"
    >
      Budgets
    </a>
    
    <!-- Disbursements -->
    <a 
      href="/disbursements" 
      class="block px-3 py-1.5 text-[12px] font-bold rounded-lg transition-all text-[#a5c3c7] hover:text-white"
    >
      Disbursements
    </a>
    
    <!-- Forecasts -->
    <a 
      href="#" 
      class="block px-3 py-1.5 text-[12px] font-bold rounded-lg transition-all text-[#a5c3c7] hover:text-white"
    >
      Forecasts
    </a>
    
    <!-- Reports -->
    <a 
      href="/reports" 
      class="block px-3 py-1.5 text-[12px] font-bold rounded-lg transition-all text-[#a5c3c7] hover:text-white"
    >
      Reports
    </a>
  </div>
</div>

<!-- Programs Submenu -->
<div x-data="{ open: false }">
  <button 
    @click="open = !open"
    class="w-full group flex items-center justify-between px-3 py-2 text-[12.5px] font-bold rounded-xl transition-all text-[#a5c3c7] hover:text-white hover:bg-[#104a50]"
  >
    <div class="flex items-center gap-3">
      <div class="h-8 w-8 rounded-lg flex items-center justify-center shrink-0">
        <svg class="h-4.5 w-4.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.168.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" />
        </svg>
      </div>
      <span x-show="!collapsed" class="whitespace-nowrap">Programs</span>
    </div>
    <svg 
      x-show="!collapsed"
      class="h-4 w-4 transform transition-transform duration-200" 
      :class="open ? 'rotate-180' : ''" 
      fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"
    >
      <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7" />
    </svg>
  </button>
</div>

  >
    <div class="flex items-center gap-3">
      <div class="h-8 w-8 rounded-lg flex items-center justify-center shrink-0">
        <svg class="h-4.5 w-4.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 002 2h2a2 2 0 002-2z" />
        </svg>
      </div>
      <span x-show="!collapsed" class="whitespace-nowrap">Monitoring</span>
    </div>
    <svg 
      x-show="!collapsed"
      class="h-4 w-4 transform transition-transform duration-200" 
      :class="open ? 'rotate-180' : ''" 
      fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"
    >
      <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7" />
    </svg>
  </button>

      <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7" />
