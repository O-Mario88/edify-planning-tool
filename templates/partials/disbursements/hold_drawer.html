{% comment %}Hold drawer — pause a disbursement without rejecting. Params: selected, fy, month, hold_reasons.{% endcomment %}
<div x-data="{ active: true }" x-show="active" x-cloak
     @close-drawer.window="active=false; setTimeout(()=>$el.remove(), 220)"
     @keydown.escape.window="$dispatch('close-drawer')"
     class="fixed inset-0 z-[60] flex items-start justify-center px-4 pt-[10vh] pb-6"
     aria-modal="true" role="dialog">
  <div class="fixed inset-0 bg-slate-900/50 backdrop-blur-md" x-show="active" x-transition.opacity @click="$dispatch('close-drawer')"></div>
  <div class="relative z-10 w-full max-w-[480px] bg-white rounded-lg shadow-2xl border border-slate-200 overflow-hidden"
       x-show="active"
       x-transition:enter="transition ease-out duration-200" x-transition:enter-start="opacity-0 translate-y-3 scale-[0.98]" x-transition:enter-end="opacity-100 translate-y-0 scale-100">
    <div class="px-5 py-4 border-b border-slate-100 flex items-start gap-3">
      <div class="h-9 w-9 rounded-xl bg-amber-50 text-amber-600 flex items-center justify-center shrink-0">
        <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M10 9v6m4-6v6m7-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
      </div>
      <div>
        <h2 class="text-[15px] font-semibold text-slate-800 tracking-tight">Hold — {{ selected.name }}</h2>
        <p class="text-[11.5px] font-semibold text-slate-400">The item stays in your queue but cannot be disbursed until released.</p>
      </div>
    </div>
    <form hx-post="/disbursements/action" hx-target="#disb-root" hx-swap="innerHTML" class="p-5 space-y-4">
      {% csrf_token %}
      <input type="hidden" name="action" value="hold">
      <input type="hidden" name="fund_request_id" value="{{ selected.fund_request_id }}">
      <input type="hidden" name="fy" value="{{ fy }}">
      <input type="hidden" name="month" value="{{ month }}">
      <input type="hidden" name="item" value="{{ selected.key }}">
      <div class="space-y-1">
        <label class="text-[11px] uppercase font-bold text-slate-400 tracking-wider">Hold Reason <span class="text-rose-500">*</span></label>
        <select name="reason" required class="w-full h-10 px-3 rounded-xl border border-slate-200 text-[12.5px] font-semibold text-slate-700 bg-slate-50 focus:bg-white focus:border-amber-400 focus:outline-none">
          <option value="">Select a reason…</option>
          {% for r in hold_reasons %}<option value="{{ r }}">{{ r }}</option>{% endfor %}
        </select>
      </div>
      <div class="space-y-1">
        <label class="text-[11px] uppercase font-bold text-slate-400 tracking-wider">Comment <span class="normal-case text-slate-300">(optional)</span></label>
        <textarea name="comment" rows="3" placeholder="Context for the hold…"
                  class="w-full px-3 py-2 rounded-xl border border-slate-200 text-[12.5px] font-medium bg-slate-50 focus:bg-white focus:border-amber-400 focus:outline-none resize-none"></textarea>
      </div>
      <div class="flex items-center justify-end gap-2 pt-1">
        <button type="button" @click="$dispatch('close-drawer')" class="h-10 px-4 rounded-xl border border-slate-200 bg-white hover:bg-slate-50 text-[12px] font-bold text-slate-600 transition-colors">Cancel</button>
        <button type="submit" class="h-10 px-5 rounded-xl bg-amber-500 hover:bg-amber-600 text-white text-[12px] font-bold shadow-sm transition-colors">Place on Hold</button>
      </div>
    </form>
  </div>
</div>
