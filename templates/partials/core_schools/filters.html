<form
id="core-filters-form"
hx-get="/core-schools"
hx-trigger="change delay:100ms"
hx-target="#core-schools-main-container"
hx-swap="outerHTML"
hx-push-url="true"
@change="if ($event.target.id !== 'core-filters-page-input') { const p = document.getElementById('core-filters-page-input'); if (p) p.value = '1' }"
class="flex flex-wrap items-center justify-between gap-3 edify-surface p-4 rounded-xl border border-slate-100 shadow-sm "
>
<input type="hidden" name="page" id="core-filters-page-input" value="{{ page_obj.number|default:1 }}">
<div class="flex flex-wrap items-center gap-2.5 edify-text-caption font-bold text-slate-600">

<!-- FY -->
<div class="flex items-center gap-1.5 bg-slate-50 px-3 py-2 rounded-lg border border-slate-200 shadow-sm">
<span class="text-slate-400">FY</span>
<select name="fy" class="bg-transparent focus:outline-none cursor-pointer text-slate-700">
<option value="2026" {% if selected_fy == "2026" %}selected{% endif %}>2026</option>
<option value="2025" {% if selected_fy == "2025" %}selected{% endif %}>2025</option>
<option value="2024" {% if selected_fy == "2024" %}selected{% endif %}>2024</option>
</select>
</div>

<!-- Region -->
<div class="flex items-center gap-1.5 bg-slate-50 px-3 py-2 rounded-lg border border-slate-200 shadow-sm">
<span class="text-slate-400">Region</span>
<select name="region" class="bg-transparent focus:outline-none cursor-pointer text-slate-700">
<option value="All">All Regions</option>
{% for r in regions %}
<option value="{{ r.id }}" {% if selected_region == r.id %}selected{% endif %}>{{ r.name }}</option>
{% endfor %}
</select>
</div>

<!-- District -->
<div class="flex items-center gap-1.5 bg-slate-50 px-3 py-2 rounded-lg border border-slate-200 shadow-sm">
<span class="text-slate-400">District</span>
<select name="district" class="bg-transparent focus:outline-none cursor-pointer text-slate-700">
<option value="All">All Districts</option>
{% for d in districts %}
<option value="{{ d.id }}" {% if selected_district == d.id %}selected{% endif %}>{{ d.name }}</option>
{% endfor %}
</select>
</div>

<!-- Staff -->
<div class="flex items-center gap-1.5 bg-slate-50 px-3 py-2 rounded-lg border border-slate-200 shadow-sm">
<span class="text-slate-400">Staff</span>
<select name="staff" class="bg-transparent focus:outline-none cursor-pointer text-slate-700">
<option value="All">All Staff</option>
{% for s in staff_members %}
<option value="{{ s.user_id }}" {% if selected_staff == s.user_id %}selected{% endif %}>{{ s.user.name }}</option>
{% endfor %}
</select>
</div>

<!-- Partner -->
<div class="flex items-center gap-1.5 bg-slate-50 px-3 py-2 rounded-lg border border-slate-200 shadow-sm">
<span class="text-slate-400">Partner</span>
<select name="partner" class="bg-transparent focus:outline-none cursor-pointer text-slate-700">
<option value="All">All Partners</option>
{% for p in partners %}
<option value="{{ p.id }}" {% if selected_partner == p.id %}selected{% endif %}>{{ p.name }}</option>
{% endfor %}
</select>
</div>

<!-- Advanced/More Filters Toggle -->
<div x-data="{ expanded: false }" class="relative">
<button
type="button"
@click="expanded = !expanded"
class="flex items-center gap-1 bg-slate-50 hover:bg-slate-100 px-3 py-2 rounded-lg border border-slate-200 shadow-sm transition-colors text-slate-700"
>
<svg class="h-3.5 w-3.5 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 4a1 1 0 011-1h16a1 1 0 011 1v2.586a1 1 0 01-.293.707l-6.414 6.414a1 1 0 00-.293.707V17l-4 4v-6.586a1 1 0 00-.293-.707L3.293 7.293A1 1 0 013 6.586V4z"/></svg>
More Filters
</button>

<!-- Dropdown drawer of more filters -->
<div
x-show="expanded"
@click.away="expanded = false"
x-transition
class="absolute left-0 mt-2 w-72 edify-surface rounded-xl  shadow-xl p-4 z-40 space-y-3 text-[12px] font-bold text-slate-600"
style="display: none;"
>
<!-- School Type Filter -->
<div>
<label class="block edify-text-caption font-bold uppercase tracking-wider text-slate-400 mb-1">School Type</label>
<select name="school_type_filter" class="w-full h-8 px-2 rounded-lg border border-slate-200 bg-slate-50 focus:outline-none">
<option value="All" {% if selected_school_type == "All" %}selected{% endif %}>All Types</option>
<option value="core" {% if selected_school_type == "core" %}selected{% endif %}>Core</option>
<option value="champion" {% if selected_school_type == "champion" %}selected{% endif %}>Champion</option>
</select>
</div>

<!-- SSA Status Filter -->
<div>
<label class="block edify-text-caption font-bold uppercase tracking-wider text-slate-400 mb-1">SSA Status</label>
<select name="ssa_status" class="w-full h-8 px-2 rounded-lg border border-slate-200 bg-slate-50 focus:outline-none">
<option value="All" {% if selected_ssa_status == "All" %}selected{% endif %}>All</option>
<option value="done" {% if selected_ssa_status == "done" %}selected{% endif %}>Complete</option>
<option value="not_done" {% if selected_ssa_status == "not_done" %}selected{% endif %}>Pending</option>
</select>
</div>

<!-- Partner Assigned status -->
<div>
<label class="block edify-text-caption font-bold uppercase tracking-wider text-slate-400 mb-1">Partner Status</label>
<select name="partner_assigned" class="w-full h-8 px-2 rounded-lg border border-slate-200 bg-slate-50 focus:outline-none">
<option value="All" {% if selected_partner_assigned == "All" %}selected{% endif %}>All</option>
<option value="assigned" {% if selected_partner_assigned == "assigned" %}selected{% endif %}>Partner Assigned</option>
<option value="unassigned" {% if selected_partner_assigned == "unassigned" %}selected{% endif %}>Not Assigned</option>
</select>
</div>

<!-- Submit Button for Drawer -->
<button
type="submit"
@click="expanded = false"
class="w-full h-8 btn-premium-primary text-white rounded-lg edify-text-caption font-bold mt-2 shadow-sm"
>
Apply Advanced Filters
</button>
</div>
</div>

</div>

<div class="flex items-center">
<button
type="button"
hx-get="/core-schools/strategy-playbook"
hx-target="#drawer-container"
class="h-9 px-4 btn-premium-primary text-white font-semibold rounded-xl text-[12px] tracking-wide flex items-center shadow-md transition-all"
>
<svg class="h-4 w-4 mr-1.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/></svg>
Create Core Plan
</button>
</div>
</form>
