# Edify Planning & Monitoring Tool — full stack (db + api + web).
#
#   cp .env.example .env   # set POSTGRES_PASSWORD + JWT_SECRET + SUPER_ADMIN_PASSWORD
#   docker compose up --build
#
# The api (Django + DRF) applies migrations on boot (docker-entrypoint.sh) and
# waits for a healthy Postgres. Seed once with:  RUN_SEED=true docker compose up api

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-edify}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-edify_pm}
    volumes:
      - edify_pgdata:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-edify} -d ${POSTGRES_DB:-edify_pm}"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    # edify-api is the Django + DRF backend.
    build: ./edify-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DJANGO_SETTINGS_MODULE: config.settings.prod
      PORT: 4000
      DATABASE_URL: postgresql://${POSTGRES_USER:-edify}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-edify_pm}
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in .env (>=16 chars)}
      ACCESS_TOKEN_TTL_MINUTES: ${ACCESS_TOKEN_TTL_MINUTES:-15}
      REFRESH_TOKEN_TTL_DAYS: ${REFRESH_TOKEN_TTL_DAYS:-7}
      # The demo-role password the seed uses for the seeded accounts. The web
      # service authenticates users directly against this API, so a user's own
      # password is used (not this shared demo secret) — this only sets the
      # seeded demo accounts' initial password.
      DEMO_LOGIN_PASSWORD: ${DEMO_LOGIN_PASSWORD:-edify}
      SUPER_ADMIN_EMAIL: ${SUPER_ADMIN_EMAIL:-domario@edify.org}
      SUPER_ADMIN_PASSWORD: ${SUPER_ADMIN_PASSWORD:?set SUPER_ADMIN_PASSWORD in .env}
      # Production safety gates (config/settings/prod.py enforces these).
      ENABLE_MOCK_DATA: "false"
      ENABLE_DEV_ENDPOINTS: "false"
      AUTHZ_MODE: enforce
      ENABLE_BACKGROUND_JOBS: ${ENABLE_BACKGROUND_JOBS:-false}
      # Comma-separated allowed CORS origins (the web app's public URL).
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      RUN_SEED: ${RUN_SEED:-false}
      # Evidence files land on a persistent volume (mounted below).
      EVIDENCE_STORAGE_DIR: /data/evidence
    volumes:
      - edify_evidence:/data/evidence
    ports:
      - "${API_PORT:-4000}:4000"

  web:
    # edify-web is the repo root (edify-api lives inside it at ./edify-api), so
    # the web build context is the repo root, not a ./edify-web subdir.
    build: .
    restart: unless-stopped
    depends_on:
      api:
        condition: service_started
    environment:
      NODE_ENV: production
      PORT: 3000
      # Server-side base URL the Next proxies call (container DNS name).
      EDIFY_API_URL: http://api:4000/api
      EDIFY_USE_BACKEND: "true"
      # Session signing — login returns 503 in production without it.
      EDIFY_SESSION_SECRET: ${EDIFY_SESSION_SECRET:?set EDIFY_SESSION_SECRET in .env}
      # Always-on super-admin login (the one persistent account).
      SUPER_ADMIN_EMAIL: ${SUPER_ADMIN_EMAIL:-domario@edify.org}
      SUPER_ADMIN_PASSWORD: ${SUPER_ADMIN_PASSWORD:?set SUPER_ADMIN_PASSWORD in .env}
      # Never render frontend mock data in this stack — the API is the source of truth.
      NEXT_PUBLIC_USE_MOCK_DATA: "false"
      # Do NOT set DATABASE_URL here: it flips web into its own Prisma mode (a second,
      # divergent copy of the data). Data is proxied to edify-api. See DEPLOY.md §3.

volumes:
  edify_pgdata:
  edify_evidence:
