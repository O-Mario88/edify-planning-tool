# Edify Planning & Monitoring Tool — full stack (db + api + web).
#
#   cp .env.example .env   # set POSTGRES_PASSWORD + JWT_SECRET + SUPER_ADMIN_PASSWORD
#   docker compose up --build
#
# The api (Django + DRF) applies migrations on boot (docker-entrypoint.sh) and
# waits for a healthy Postgres. Seed once with:  RUN_SEED=true docker compose up api

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-edify}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-edify_pm}
    volumes:
      - edify_pgdata:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-edify} -d ${POSTGRES_DB:-edify_pm}"]
      interval: 10s
      timeout: 5s
      retries: 10

  web:
    # Django + DRF + HTMX monolithic application
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DJANGO_SETTINGS_MODULE: config.settings.prod
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1,web}
      PORT: 4000
      SECURE_SSL_REDIRECT: "false"
      SESSION_COOKIE_SECURE: "false"
      CSRF_COOKIE_SECURE: "false"
      DATABASE_URL: postgresql://${POSTGRES_USER:-edify}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-edify_pm}
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in .env (>=16 chars)}
      ACCESS_TOKEN_TTL_MINUTES: ${ACCESS_TOKEN_TTL_MINUTES:-15}
      REFRESH_TOKEN_TTL_DAYS: ${REFRESH_TOKEN_TTL_DAYS:-7}
      DEMO_LOGIN_PASSWORD: ${DEMO_LOGIN_PASSWORD:-edify}
      SUPER_ADMIN_EMAIL: ${SUPER_ADMIN_EMAIL:-domario@edify.org}
      SUPER_ADMIN_PASSWORD: ${SUPER_ADMIN_PASSWORD:?set SUPER_ADMIN_PASSWORD in .env}
      ENABLE_MOCK_DATA: "false"
      ENABLE_DEV_ENDPOINTS: "false"
      AUTHZ_MODE: enforce
      ENABLE_BACKGROUND_JOBS: ${ENABLE_BACKGROUND_JOBS:-false}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:4000}
      RUN_SEED: ${RUN_SEED:-false}
      EVIDENCE_STORAGE_DIR: /data/evidence
    volumes:
      - edify_evidence:/data/evidence
    ports:
      - "${PORT:-4000}:4000"

volumes:
  edify_pgdata:
  edify_evidence:
