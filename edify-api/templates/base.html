{% load static %}
<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Edify School Improvement Planning{% endblock %}</title>
  
  <!-- Typography (Canonical Source Sans/Inter Scale) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Source+Sans+3:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- Compiled Tailwind Styling -->
  <link rel="stylesheet" href="{% static 'css/main.css' %}">
  
  <style>
    :root {
      --color-edify-primary: #4f46e5; /* Electric Indigo */
      --color-edify-dark: #3730a3;
      --color-edify-soft: #eeebff;
      --color-edify-border: #e2e8f0;
      --color-edify-divider: #f1f5f9;
      --bg-page: #f8fafc;
      --foreground: #0f172a;
      --border-card: #e2e8f0;
      --text-secondary: #475569;
    }
    
    body {
      font-family: 'Outfit', sans-serif !important;
      background-color: var(--bg-page);
    }
    
    /* Premium card shadows & glassmorphism effects */
    .bg-white {
      background-color: rgba(255, 255, 255, 0.9) !important;
      backdrop-filter: blur(12px);
      border-radius: 16px !important;
      box-shadow: 0 4px 20px -2px rgba(148, 163, 184, 0.08), 0 2px 8px -1px rgba(148, 163, 184, 0.04) !important;
      border: 1px solid rgba(226, 232, 240, 0.8) !important;
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }
    
    /* Interactive card hovers */
    .bg-white:hover {
      box-shadow: 0 12px 30px -4px rgba(148, 163, 184, 0.15), 0 4px 12px -2px rgba(148, 163, 184, 0.08) !important;
      transform: translateY(-2px);
    }
    
    /* Sleek buttons styling */
    button, a, .button-style {
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }
    
    /* Inputs style */
    input, select, textarea {
      transition: all 0.2s ease;
    }
    input:focus, select:focus, textarea:focus {
      border-color: var(--color-edify-primary) !important;
      box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.15) !important;
      background-color: #ffffff !important;
    }
  </style>

  <!-- HTMX (for fast server-driven partial updates) -->
  <script src="https://unpkg.com/htmx.org@1.9.12" integrity="sha384-ujb1lZYygJmzgSwoxRggbCHcjc0rB2XoQrxeTUQyRjrOnlCoYta87iKBWq3EsdM2" crossorigin="anonymous"></script>

  <!-- Alpine.js (for client-side UI states - dropdown toggles, tabs, sidebars) -->
  <script defer src="https://unpkg.com/alpinejs@3.14.0/dist/cdn.min.js"></script>
</head>
<body 
  class="h-full bg-[var(--bg-page)] text-[var(--foreground)] font-sans antialiased"
  hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}'
>
  {% block content %}{% endblock %}

  <!-- Global Flash/Alert Messages -->
  <div id="toast-container" class="fixed bottom-4 right-4 z-50 space-y-2 pointer-events-none">
    {% if messages %}
      {% for msg in messages %}
        <div 
          x-data="{ show: true }" 
          x-show="show" 
          x-init="setTimeout(() => show = false, 4000)"
          x-transition
          class="pointer-events-auto flex items-center justify-between gap-3 px-4 py-3 rounded-xl border shadow-lg max-w-sm text-[12.5px] font-semibold {% if msg.tags == 'success' %}bg-emerald-50 text-emerald-700 border-emerald-200{% elif msg.tags == 'error' %}bg-rose-50 text-rose-700 border-rose-200{% else %}bg-slate-50 text-slate-700 border-slate-200{% endif %}"
        >
          <span>{{ msg }}</span>
          <button @click="show = false" class="text-current opacity-70 hover:opacity-100">&times;</button>
        </div>
      {% endfor %}
    {% endif %}
  </div>
</body>
</html>
