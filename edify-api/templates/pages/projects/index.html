{% extends "layouts/shell.html" %}

{% block title %}Projects — Edify{% endblock %}

{% block shell_content %}
<div class="p-6 max-w-7xl mx-auto space-y-6">
  
  <div class="flex items-center justify-between">
    <div>
      <h1 class="text-[26px] font-extrabold text-slate-800 tracking-tight">Projects</h1>
      <p class="text-[12.5px] text-[var(--text-secondary)] mt-1 font-semibold">Edify Operations · Projects</p>
    </div>
  </div>
  
  <div class="bg-white rounded-2xl border border-[var(--border-card)] shadow-sm overflow-hidden">
    {% if projects %}<table class="w-full text-[12.5px]"><thead><tr class="bg-slate-50/60 border-b border-slate-100"><th class="text-left px-5 py-3 text-[10px] font-bold uppercase text-slate-400">Project</th><th class="px-4 py-3"></th></tr></thead>
    <tbody class="divide-y divide-slate-100">{% for p in projects %}<tr class="hover:bg-slate-50/60 group"><td class="px-5 py-3.5 font-bold text-slate-800">{{ p.name }}</td><td class="px-4 py-3.5 text-right"><a href="/projects/{{ p.id }}" class="opacity-0 group-hover:opacity-100 text-[11px] font-bold text-[var(--color-edify-primary)] transition-opacity">View →</a></td></tr>{% endfor %}</tbody></table>
    {% else %}<div class="p-12 text-center"><p class="text-[36px] mb-3">📁</p><p class="text-[14px] font-bold text-slate-600">No projects found</p></div>{% endif %}
  </div>

</div>
{% endblock %}
